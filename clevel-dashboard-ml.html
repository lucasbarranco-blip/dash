<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard C-Level — Ganga Home v10</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#fff;--bg2:#f7f8fa;--bg3:#f0f2f5;--bg4:#e4e7ec;
  --border:#e0e3e8;--border2:#cdd0d6;
  --txt:#111827;--txt2:#4b5563;--txt3:#9ca3af;--txt4:#d1d5db;
  --y:#ffe600;--yd:#c8b400;--ybg:#fffce0;--yb:#f0e000;
  --g:#16a34a;--gbg:#f0fdf4;--gb:#bbf7d0;
  --r:#dc2626;--rbg:#fef2f2;--rb:#fecaca;
  --b:#2563eb;--bbg:#eff6ff;--bbo:#bfdbfe;
  --o:#ea580c;--obg:#fff7ed;--ob:#fed7aa;
  --p:#7c3aed;--pbg:#f5f3ff;--pb:#ddd6fe;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 16px rgba(0,0,0,.09),0 2px 6px rgba(0,0,0,.05);
  --radius:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg2);color:var(--txt)}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:224px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.logo-wrap{padding:14px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-ico{width:34px;height:34px;background:var(--y);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-ico svg{width:18px;height:18px}
.logo-name{font-size:13px;font-weight:800;color:var(--txt);letter-spacing:-.03em}
.logo-sub{font-size:9px;color:var(--txt3)}
.nav{flex:1;padding:6px 8px;overflow-y:auto}
.nsec{font-size:9px;font-weight:700;color:var(--txt4);letter-spacing:.12em;text-transform:uppercase;padding:10px 8px 3px}
.ni{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;cursor:pointer;font-size:11.5px;color:var(--txt2);margin-bottom:1px;border:none;background:none;width:100%;text-align:left;transition:all .12s;font-family:var(--font);font-weight:500}
.ni:hover{background:var(--bg2);color:var(--txt)}
.ni.active{background:var(--y);color:#111;font-weight:700}
.ni svg{flex-shrink:0;width:13px;height:13px;opacity:.8}
.ni.active svg{opacity:1}
.nbadge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px;margin-left:auto;flex-shrink:0}
.nbadge.r{background:var(--rbg);color:var(--r);border:1px solid var(--rb)}
.nbadge.g{background:var(--gbg);color:var(--g);border:1px solid var(--gb)}
.nbadge.o{background:var(--obg);color:var(--o);border:1px solid var(--ob)}
.nbadge.b{background:var(--bbg);color:var(--b);border:1px solid var(--bbo)}
.sfoot{padding:8px 12px;border-top:1px solid var(--border);flex-shrink:0;font-size:9.5px;color:var(--txt3);line-height:1.6}
.sfoot strong{color:var(--txt2);font-weight:600}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.topbar-l h2{font-size:14.5px;font-weight:700;color:var(--txt);letter-spacing:-.02em}
.topbar-l p{font-size:10px;color:var(--txt3);margin-top:1px}
.topbar-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
.conn-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;font-size:10px;font-weight:600}
.conn-badge.ok{background:var(--gbg);border:1px solid var(--gb);color:var(--g)}
.conn-badge.loading{background:var(--ybg);border:1px solid var(--yb);color:#856400}
.conn-badge.error{background:var(--rbg);border:1px solid var(--rb);color:var(--r)}
.cdot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.tbtn{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 11px;font-size:10.5px;cursor:pointer;font-family:var(--font);color:var(--txt2);font-weight:600;transition:all .12s;white-space:nowrap}
.tbtn:hover{background:var(--bg3)}
.tbtn.primary{background:var(--y);border-color:var(--yd);color:#111;font-weight:700}

/* FILTER BAR */
.fbar{background:var(--bg);border-bottom:1px solid var(--border);padding:6px 14px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;flex-shrink:0}
.flbl{font-size:9px;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.fsep{width:1px;height:16px;background:var(--border);margin:0 1px;flex-shrink:0}
.fsearch{position:relative}
.fsearch svg{position:absolute;left:7px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none;width:11px;height:11px}
.fsearch input{padding-left:24px;width:150px}
input[type=text],input[type=date],select{background:var(--bg2);border:1px solid var(--border);border-radius:5px;color:var(--txt);font-size:10.5px;font-family:var(--font);padding:3px 7px;outline:none;transition:border .12s;height:24px}
input[type=text]:focus,input[type=date]:focus,select:focus{border-color:var(--yd);background:var(--bg)}
.prange{display:flex;align-items:center;gap:3px}
.prange span{font-size:9.5px;color:var(--txt3)}
.qbtn{background:var(--bg2);border:1px solid var(--border);border-radius:5px;color:var(--txt2);font-size:10px;font-family:var(--font);padding:3px 9px;cursor:pointer;transition:all .12s;font-weight:500;height:24px;white-space:nowrap}
.qbtn:hover{border-color:var(--border2);color:var(--txt)}
.qbtn.active{background:var(--ybg);border-color:var(--yd);color:#856400;font-weight:700}
.fclr{font-size:9.5px;color:var(--txt3);cursor:pointer;padding:2px 6px;border-radius:4px;border:none;background:none;font-family:var(--font)}
.fclr:hover{color:var(--r)}
.fcount{font-size:9.5px;color:var(--txt3);margin-left:auto;white-space:nowrap;flex-shrink:0}

/* CHIPS */
.chips-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:3px 14px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;min-height:0}
.chips-bar:empty{display:none;border-bottom:none;padding:0}
.chip{display:inline-flex;align-items:center;gap:3px;background:var(--ybg);border:1px solid var(--yb);border-radius:20px;padding:1px 7px;font-size:9px;color:#856400;font-weight:600}
.chipx{cursor:pointer;opacity:.6;margin-left:1px;font-size:10px}
.chipx:hover{opacity:1;color:var(--r)}

/* SUBTABS */
.subtabs{background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px;display:flex;gap:1px;overflow-x:auto;flex-shrink:0}
.stab{padding:7px 14px;font-size:11px;font-weight:500;color:var(--txt3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;font-family:var(--font)}
.stab.active{color:var(--txt);border-bottom-color:var(--yd);font-weight:700}
.stab:hover:not(.active){color:var(--txt2)}

/* PAGE */
.page{flex:1;overflow-y:auto;padding:14px 16px;background:var(--bg2)}

/* KPI CARDS */
.kg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:10px}
.kg3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:10px}
.kg2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:10px}
.kg5{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:10px}
.kc{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--sh);border-top:3px solid transparent;transition:box-shadow .15s;position:relative;overflow:hidden}
.kc:hover{box-shadow:var(--shm)}
.kc.yt{border-top-color:var(--y)}.kc.gt{border-top-color:var(--g)}.kc.rt{border-top-color:var(--r)}.kc.bt{border-top-color:var(--b)}.kc.ot{border-top-color:var(--o)}.kc.pt{border-top-color:var(--p)}
.kl{font-size:9px;color:var(--txt3);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.kv{font-size:20px;font-weight:800;color:var(--txt);line-height:1.1;letter-spacing:-.03em}
.kv.sm{font-size:15px}
.ks{font-size:10px;margin-top:3px;font-weight:600;display:flex;align-items:center;gap:2px}
.up{color:var(--g)}.dn{color:var(--r)}.ne{color:var(--txt3)}

/* PANEL */
.panel{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;box-shadow:var(--sh)}
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.panel-grid .panel{margin-bottom:0}
.panel-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.panel-grid3 .panel{margin-bottom:0}
.ph{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.pt{font-size:12px;font-weight:700;color:var(--txt)}
.ps{font-size:10px;color:var(--txt3);margin-top:1px}
.ph-r{display:flex;align-items:center;gap:6px}

/* TABLE */
.tw{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;padding:7px 11px;border-bottom:1px solid var(--border);background:var(--bg2);text-align:right;white-space:nowrap;font-weight:700;user-select:none}
.tbl th:nth-child(1){text-align:center;width:30px}
.tbl th:nth-child(2){text-align:left}
.tbl th.th-l{text-align:left}
.tbl td{padding:7px 11px;border-bottom:1px solid var(--border);color:var(--txt);text-align:right;vertical-align:middle}
.tbl td:nth-child(1){text-align:center;color:var(--txt3);font-size:10px}
.tbl td:nth-child(2){text-align:left}
.tbl td.td-l{text-align:left}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg2)}
.tfoot{padding:7px 13px;border-top:1px solid var(--border);font-size:10px;color:var(--txt3);display:flex;align-items:center;justify-content:space-between}

/* sub-row for variants */
.var-row td{background:var(--bg2)!important;font-size:10px;color:var(--txt2);padding:4px 11px}
.var-row td:nth-child(2){padding-left:28px;color:var(--txt3)}

/* PILLS */
.pill{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px}
.pill.g{background:var(--gbg);color:var(--g);border:1px solid var(--gb)}
.pill.r{background:var(--rbg);color:var(--r);border:1px solid var(--rb)}
.pill.y{background:var(--ybg);color:#856400;border:1px solid var(--yb)}
.pill.b{background:var(--bbg);color:var(--b);border:1px solid var(--bbo)}
.pill.n{background:var(--bg3);color:var(--txt3);border:1px solid var(--border)}
.pill.o{background:var(--obg);color:var(--o);border:1px solid var(--ob)}
.pill.p{background:var(--pbg);color:var(--p);border:1px solid var(--pb)}

/* MISC */
.mono{font-family:var(--mono);font-size:9.5px;color:var(--txt3)}
.pname{font-size:11px;font-weight:600;color:var(--txt);line-height:1.3}
.g-txt{color:var(--g);font-weight:600}.r-txt{color:var(--r);font-weight:600}
.y-txt{color:#856400;font-weight:600}.b-txt{color:var(--b);font-weight:600}
.o-txt{color:var(--o);font-weight:600}.p-txt{color:var(--p);font-weight:600}

.chart-wrap{position:relative;width:100%;padding:10px 12px}
.chart-wrap.h160{height:160px}.chart-wrap.h200{height:200px}.chart-wrap.h240{height:240px}

.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--yd);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:30px;color:var(--txt3);font-size:12px}
.loading-page{text-align:center;padding:50px 20px}

.vtag{display:inline-flex;align-items:center;gap:2px;font-size:9px;background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;color:var(--txt2);margin:1px 1px 0 0;white-space:nowrap}
.vs-ok{color:var(--g);font-weight:700}.vs-lo{color:#856400;font-weight:700}.vs-no{color:var(--r);font-weight:700}

.info-banner{display:flex;align-items:flex-start;gap:7px;background:var(--ybg);border:1px solid var(--yb);border-radius:8px;padding:8px 12px;font-size:10.5px;color:#856400;margin-bottom:10px;line-height:1.5}
.warn-banner{display:flex;align-items:flex-start;gap:7px;background:var(--rbg);border:1px solid var(--rb);border-radius:8px;padding:8px 12px;font-size:10.5px;color:var(--r);margin-bottom:10px;line-height:1.5}
.ok-banner{display:flex;align-items:flex-start;gap:7px;background:var(--gbg);border:1px solid var(--gb);border-radius:8px;padding:8px 12px;font-size:10.5px;color:var(--g);margin-bottom:10px;line-height:1.5}

.ai-card{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border:1px solid #0f3460;border-radius:var(--radius);padding:12px 14px;color:#fff;margin-bottom:10px}
.ai-title{font-size:10px;font-weight:700;color:#a78bfa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.ai-insight{font-size:11.5px;color:#e2e8f0;line-height:1.6;margin-bottom:5px}
.ai-insight strong{color:#fde68a}
.ai-tag{display:inline-flex;align-items:center;gap:3px;background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.3);border-radius:5px;padding:2px 7px;font-size:9.5px;color:#c4b5fd;font-weight:600;margin:2px 2px 0 0}

.brow{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.blbl{font-size:10.5px;color:var(--txt2);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btrk{flex:1;background:var(--bg3);border-radius:3px;height:6px;overflow:hidden;min-width:50px}
.bfil{height:6px;border-radius:3px}
.bval{font-size:10.5px;font-weight:700;color:var(--txt);width:70px;text-align:right;flex-shrink:0}

.rep-meter{height:10px;border-radius:5px;background:var(--bg3);overflow:hidden;margin-top:6px;max-width:280px}
.rep-fill{height:100%;border-radius:5px;transition:width .6s}

select option{background:var(--bg);color:var(--txt)}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo-wrap">
    <div class="logo-ico">
      <svg viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="5" fill="#111"/><path d="M6 12l4 4 8-8" stroke="#ffe600" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div><div class="logo-name">Ganga Home</div><div class="logo-sub">C-Level · Mercado Libre</div></div>
  </div>
  <div class="nav">
    <div class="nsec">Negocio</div>
    <button class="ni active" onclick="go('resumen',this)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Resumen Ejecutivo</button>
    <button class="ni" onclick="go('ventas',this)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Evolución de Ventas</button>
    <button class="ni" onclick="go('productos',this)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>Productos & Stock</button>
    <button class="ni" onclick="go('alertas',this)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Alertas de Stock<span class="nbadge r" id="badge-alertas">0</span></button>
    <button class="ni" onclick="go('envios',this)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>Envíos<span class="nbadge o" id="badge-envios">—</span></button>
    <div class="nsec">Analítica</div>
    <button class="ni" onclick="go('horario',this)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Análisis Horario</button>
    <button class="ni" onclick="go('comparar',this)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Comparar Períodos</button>
    <button class="ni" onclick="go('prediccion',this)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>IA & Predicciones</button>
    <div class="nsec">Cuenta</div>
    <button class="ni" onclick="go('marketing',this)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/><circle cx="12" cy="12" r="3"/></svg>Marketing</button>
    <button class="ni" onclick="go('mercado',this)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>Análisis de Mercado</button>
    <button class="ni" onclick="go('costos',this)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Costos & Rentabilidad</button>
    <button class="ni" onclick="go('facturacion',this)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Facturación</button>
    <button class="ni" onclick="go('full',this)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>Stock Full</button>
    <button class="ni" onclick="go('reputacion',this)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Reputación</button>

  </div>
  <div class="sfoot" id="sfoot"><div class="cdot pulse" style="display:inline-block;margin-right:5px;background:var(--txt3)"></div>Cargando...</div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-l"><h2 id="main-title">Resumen Ejecutivo</h2><p id="main-sub">Indicadores clave · Mercado Libre</p></div>

// ── SUPABASE HELPERS ──────────────────────────────────────
var SB_HDR = function() {
  return { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Prefer': 'count=exact' };
};

// Trae TODAS las filas sin límite, paginando de a 1000
async function sbAll(path, qs) {
  var rows = [], offset = 0, pageSize = 1000, total = Infinity;
  while (offset < total) {
    var url = SB_URL + path + '?' + (qs||'') + (qs?'&':'') + 'offset=' + offset + '&limit=' + pageSize;
    var r = await fetch(url, { headers: SB_HDR() });
    if (!r.ok) throw new Error('Supabase ' + path + ' → ' + r.status);
    var cr = r.headers.get('Content-Range'); // e.g. "0-999/16093"
    if (cr) total = parseInt(cr.split('/')[1]) || 0;
    var batch = await r.json();
    if (!batch.length) break;
    rows = rows.concat(batch);
    offset += pageSize;
    if (batch.length < pageSize) break; // última página
  }
  return rows;
}

async function sbOne(path, qs) {
  var r = await fetch(SB_URL + path + '?' + (qs||''), { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } });
  if (!r.ok) throw new Error('Supabase ' + path + ' → ' + r.status);
  return r.json();
}

// CARGA PRINCIPAL — lee todo de Supabase
async function loadData() {
  setConn('loading','Cargando desde Supabase...');
  var desde = document.getElementById('f-desde').value;
  var hasta  = document.getElementById('f-hasta').value;

  try {
    // ── 1. Ventas del período (todas, sin límite) ──────────
    var vQs = 'select=id,producto_id,producto_titulo,cantidad,total,estado,hora,fecha,costo_envio,comision_ml';
    if (desde) vQs += '&fecha=gte.' + desde;
    if (hasta) vQs += '&fecha=lte.' + hasta;
    var ventas = await sbAll('/ventas', vQs);

    // ── 2. Productos (todos) ───────────────────────────────
    var productos = await sbAll('/productos', 'select=id,titulo,precio,precio_original,stock,vendidos,estado,categoria_id,permalink,visitas_30d');

    // ── 3. Variaciones — no disponibles via anon key aún ──
    var variaciones = [];

    // ── 4. Visitas del período (opcional) ─────────────────
    var visitas = [];
    try {
      var visQs = 'select=item_id,visitas_total';
      if (desde) visQs += '&fecha=gte.' + desde;
      if (hasta) visQs += '&fecha=lte.' + hasta;
      visitas = await sbAll('/visitas', visQs);
    } catch(e) {}

    // ── 5. Reputación (último snapshot, opcional) ──────────
    var rep = {};
    try {
      var repRows = await sbOne('/reputacion_historica', 'select=*&order=fecha.desc&limit=1');
      rep = repRows[0] || {};
    } catch(e) {}

    // ── AGGREGACIÓN ────────────────────────────────────────
    var validas  = ventas.filter(function(v){ return !['cancelled','cancelada','canceled'].includes(v.estado); });
    var canceladas = ventas.filter(function(v){ return ['cancelled','cancelada','canceled'].includes(v.estado); });

    var totalFac  = validas.reduce(function(s,v){ return s+(parseFloat(v.total)||0); }, 0);
    var totalUds  = validas.reduce(function(s,v){ return s+(parseInt(v.cantidad)||0); }, 0);
    var totalOrds = new Set(validas.map(function(v){ return v.id; })).size;
    var totalVis  = visitas.reduce(function(s,v){ return s+(v.visitas_total||0); }, 0);

    // Franja top por hora
    var horaMap = {};
    validas.forEach(function(v){
      if (v.hora) horaMap[v.hora] = (horaMap[v.hora]||0) + 1;
    });
    var topHora = Object.keys(horaMap).sort(function(a,b){ return horaMap[b]-horaMap[a]; })[0];
    var franjaTop = topHora ? topHora+':00 – '+(parseInt(topHora)+1)+':00 hs' : '—';

    // Ventas por día
    var ventasPorDia = {};
    validas.forEach(function(v){
      var d = v.fecha;
      if (!ventasPorDia[d]) ventasPorDia[d] = { ventas:0, facturacion:0, unidades:0 };
      ventasPorDia[d].ventas++;
      ventasPorDia[d].facturacion += parseFloat(v.total)||0;
      ventasPorDia[d].unidades   += parseInt(v.cantidad)||0;
    });

    // Ventas por producto (período completo)
    var vPorProd = {};
    validas.forEach(function(v){
      var pid = v.producto_id;
      if (!vPorProd[pid]) vPorProd[pid] = { uds:0, fac:0 };
      vPorProd[pid].uds += parseInt(v.cantidad)||0;
      vPorProd[pid].fac += parseFloat(v.total)||0;
    });

    // Ventas últimos 7 días (para columna uds7 en alertas)
    var hace7 = new Date(); hace7.setDate(hace7.getDate()-7);
    var v7Prod = {};
    validas.filter(function(v){ return new Date(v.fecha) >= hace7; }).forEach(function(v){
      v7Prod[v.producto_id] = (v7Prod[v.producto_id]||0) + (parseInt(v.cantidad)||0);
    });

    // Variaciones por producto
    var varPorProd = {};
    variaciones.forEach(function(v){
      if (!varPorProd[v.item_id]) varPorProd[v.item_id] = [];
      varPorProd[v.item_id].push({
        atributos: v.attributes || '',
        sku: v.seller_sku || '',
        stock: v.stock || 0
      });
    });

    // Período
    var dias = Object.keys(ventasPorDia).sort();
    var pDesde = desde || dias[0] || '';
    var pHasta = hasta || dias[dias.length-1] || '';
    var pDias  = pDesde && pHasta
      ? Math.round((new Date(pHasta) - new Date(pDesde)) / 864e5) + 1 : 0;

    // Cancelaciones para reputación
    var cancRate = totalOrds > 0 ? canceladas.length / (totalOrds + canceladas.length) : 0;

    // ── BUILD D ────────────────────────────────────────────
    D = {
      metricas: {
        facturacion:    totalFac,
        unidades:       totalUds,
        ventas:         totalOrds,
        conversion:     totalVis > 0 ? totalOrds / totalVis * 100 : 0,
        visitas:        totalVis,
        ticketPromedio: totalOrds > 0 ? totalFac / totalOrds : 0,
        precioPromUnd:  totalUds  > 0 ? totalFac / totalUds  : 0,
        franjaTop:      franjaTop
      },
      reputacion: {
        nivel:          rep.nivel || '—',
        reclamos:       rep.reclamos_pct || 0,
        reclamosMalo:   (rep.reclamos_pct||0) > 0.02,
        cancelaciones:  cancRate,
        cancelacMalo:   cancRate > 0.05,
        demoras:        rep.demoras_pct || 0,
        demorasMalo:    (rep.demoras_pct||0) > 0.10
      },
      stockItems: productos.map(function(p){
        var vp  = vPorProd[p.id] || { uds:0, fac:0 };
        var pDi = pDias > 0 ? vp.uds / pDias : 0;
        var ds  = pDi > 0 ? Math.round((p.stock||0) / pDi) : (p.stock > 0 ? 9999 : 0);
        return {
          id:           p.id,
          titulo:       p.titulo || '',
          precio:       parseFloat(p.precio)||0,
          stock:        parseInt(p.stock)||0,
          unidsPeriodo: vp.uds,
          facturacion:  vp.fac,
          uds7:         v7Prod[p.id] || 0,
          diasStock:    ds,
          promDiario:   pDi,
          sku:          p.id,
          permalink:    p.permalink || '',
          variaciones:  varPorProd[p.id] || []
        };
      }),
      ventasPorDia: ventasPorDia,
      periodo:  { desde: pDesde, hasta: pHasta, dias: pDias },
      muestreo: 'Datos exactos de Supabase · ' + ventas.length.toLocaleString('es-AR') + ' registros',
      syncedAt: new Date().toISOString()
    };

    processData();
    setConn('ok','Supabase · ' + totalOrds.toLocaleString('es-AR') + ' ventas');
    updateSfoot();
    loadEnvios();

  } catch(e) { setConn('error','Error'); showErr(e.message); }
}

// CATEGORÍAS
function detectCat(t) {
  var tl=t.toLowerCase();
  if(tl.includes('dubai')||tl.includes('cubre edred')||tl.includes('moscu')||tl.includes('moscú'))return'cubre';
  if(tl.includes('acolchado'))return'acolchados';
  if(tl.includes('saban')||tl.includes('sábana')||tl.includes('juego de sab'))return'sabanas';
  if(tl.includes('toall'))return'toallas';
  if(tl.includes('manta')||tl.includes('pie de cama')||tl.includes('cubre sill'))return'mantas';
  if(tl.includes('mantel'))return'manteles';
  if(tl.includes('cortina'))return'cortinas';
  if(tl.includes('cubrecama'))return'cubrecama';
  if(tl.includes('edredon')||tl.includes('edredón')||tl.includes('marbella')||tl.includes('atenas'))return'edredones';
  if(tl.includes('frazada'))return'frazadas';
  return'deco';
}
var CAT_NAMES={cubre:'Cubre Edredón',acolchados:'Acolchados',sabanas:'Sábanas',toallas:'Toallas',mantas:'Mantas/Pie de cama',manteles:'Manteles',cortinas:'Cortinas',cubrecama:'Cubrecama',edredones:'Edredones',frazadas:'Frazadas',deco:'Deco & Hogar'};

    document.getElementById('f-hasta').value='';
  }
  loadData();

function applyFilters() {
  gF.q=document.getElementById('f-q').value.toLowerCase().trim();
  gF.cat=document.getElementById('f-cat').value;
  gF.estado=document.getElementById('f-estado').value;
  FILTERED=ALL.filter(function(it){
    if(gF.q&&!it.titulo.toLowerCase().includes(gF.q))return false;
    if(gF.cat&&it.cat!==gF.cat)return false;
    if(gF.estado&&it.estado!==gF.estado)return false;
    return true;
  });
  document.getElementById('f-count').textContent=FILTERED.length+' de '+ALL.length+' productos';
  renderChips(); renderPage();
}
function renderChips() {
  var chips=[];
  if(gF.q)chips.push({l:'Búsqueda: "'+gF.q+'"',k:'q'});
  if(gF.cat)chips.push({l:'Cat: '+(CAT_NAMES[gF.cat]||gF.cat),k:'cat'});
  if(gF.estado)chips.push({l:'Stock: '+gF.estado,k:'estado'});
  var desde=document.getElementById('f-desde').value,hasta=document.getElementById('f-hasta').value;
  if(desde&&hasta)chips.push({l:desde+' → '+hasta,k:'fecha'});
  document.getElementById('chips-bar').innerHTML=chips.map(function(c){
    return '<span class="chip">'+c.l+'<span class="chipx" onclick="clearFilter(\''+c.k+'\')">×</span></span>';
  }).join('');
}
function clearFilter(k) {
  if(k==='q'){document.getElementById('f-q').value='';gF.q='';}
  if(k==='cat'){document.getElementById('f-cat').value='';gF.cat='';}
  if(k==='estado'){document.getElementById('f-estado').value='';gF.estado='';}
  if(k==='fecha'){document.getElementById('f-desde').value='';document.getElementById('f-hasta').value='';loadData();return;}
  applyFilters();
}
function clearFilters() {
  document.getElementById('f-q').value='';document.getElementById('f-cat').value='';document.getElementById('f-estado').value='';
  document.querySelectorAll('.qbtn').forEach(function(b){b.classList.remove('active')});
  document.getElementById('btn-30').classList.add('active');
  gF={q:'',desde:'',hasta:'',cat:'',estado:''};
  loadData();
}

// HELPERS
var fmt=function(n){return Math.round(n).toLocaleString('es-AR')};
var fmtP=function(n){return '$ '+Math.round(n).toLocaleString('es-AR')};
var fmtM=function(n){
  if(n>=1e9)return '$ '+(n/1e9).toFixed(2).replace('.',',')+'B';
  if(n>=1e6)return '$ '+(n/1e6).toFixed(2).replace('.',',')+'M';
  if(n>=1e3)return '$ '+Math.round(n/1000).toLocaleString('es-AR')+'k';
  return fmtP(n);
};
function cleanT(t){return t.replace(/ \| Ganga Home.*/,'').replace(/ \| Tommy Hilfiger.*/,'');}
function pill(t,c){return '<span class="pill '+c+'">'+t+'</span>';}
function kc(l,v,sc,cls){
  return '<div class="kc '+(cls||'')+'"><div class="kl">'+l+'</div><div class="kv">'+(v||'—')+'</div>'+(sc?'<div class="ks '+(sc.c||'ne')+'">'+sc.t+'</div>':'')+' </div>';
}
function panel(title,sub,body,right){
  return '<div class="panel"><div class="ph"><div><div class="pt">'+title+'</div>'+(sub?'<div class="ps">'+sub+'</div>':'')+' </div>'+(right?'<div class="ph-r">'+right+'</div>':'')+' </div>'+body+'</div>';
}
function mkChart(id,type,labels,datasets,opts){
  setTimeout(function(){
    var el=document.getElementById(id);if(!el)return;
    if(charts[id]){charts[id].destroy();delete charts[id];}
    charts[id]=new Chart(el,{type:type,data:{labels:labels,datasets:datasets},
      options:Object.assign({responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#9ca3af',font:{size:9}}},
                y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#9ca3af',font:{size:9}}}}
      },opts||{})});
  },60);
}

async function runComparar() {
  var el=document.getElementById('comp-result');
  el.innerHTML='<div class="loading-page"><div class="spinner"></div></div>';
  try {
    var cDesde = document.getElementById('comp-desde').value;
    var cHasta = document.getElementById('comp-hasta').value;
    var vQs = 'select=id,cantidad,total,estado&fecha=gte.'+cDesde+'&fecha=lte.'+cHasta;
    var ventasB = await sbAll('/ventas', vQs);
    var validasB = ventasB.filter(function(v){ return !['cancelled','cancelada','canceled'].includes(v.estado); });
    var mB = {
      facturacion:   validasB.reduce(function(s,v){ return s+(parseFloat(v.total)||0); }, 0),
      unidades:      validasB.reduce(function(s,v){ return s+(parseInt(v.cantidad)||0); }, 0),
      ventas:        new Set(validasB.map(function(v){ return v.id; })).size,
    };
    mB.ticketPromedio  = mB.ventas  > 0 ? mB.facturacion / mB.ventas  : 0;
    mB.precioPromUnd   = mB.unidades > 0 ? mB.facturacion / mB.unidades : 0;
    var mA = D.metricas;
    function delta(a,b){ return b>0?((a-b)/b*100):0; }
    function compRow(label,a,b,d){
      var cls=d>0?'g-txt':d<0?'r-txt':'ne',icon=d>0?'▲':d<0?'▼':'—';
      return '<tr><td class="td-l" style="font-weight:600">'+label+'</td><td style="font-weight:700">'+a+'</td><td style="color:var(--txt2)">'+b+'</td><td class="'+cls+'" style="font-weight:700">'+icon+' '+Math.abs(d).toFixed(1)+'%</td></tr>';
    }
    el.innerHTML='<div class="panel"><div class="ph"><div><div class="pt">Resultado</div><div class="ps">A: '+document.getElementById('f-desde').value+' → '+document.getElementById('f-hasta').value+' · B: '+cDesde+' → '+cHasta+'</div></div></div>'+
      '<div class="tw"><table class="tbl"><thead><tr><th class="th-l">Métrica</th><th>Período A</th><th>Período B</th><th>Variación</th></tr></thead><tbody>'+
      compRow('Ventas brutas',fmtM(mA.facturacion),fmtM(mB.facturacion),delta(mA.facturacion,mB.facturacion))+
      compRow('Cantidad de ventas',fmt(mA.ventas),fmt(mB.ventas),delta(mA.ventas,mB.ventas))+
      compRow('Unidades vendidas',fmt(mA.unidades),fmt(mB.unidades),delta(mA.unidades,mB.unidades))+
      compRow('Ticket promedio',fmtP(mA.ticketPromedio),fmtP(mB.ticketPromedio),delta(mA.ticketPromedio,mB.ticketPromedio))+
      compRow('Precio prom. unidad',fmtP(mA.precioPromUnd),fmtP(mB.precioPromUnd),delta(mA.precioPromUnd,mB.precioPromUnd))+
      '</tbody></table></div></div>';
  }catch(e){el.innerHTML='<div class="warn-banner">Error: '+e.message+'</div>';}
}

// IA & PREDICCIONES
function rPrediccion() {
  var m=D.metricas,data=FILTERED.filter(function(it){return it.unidsPeriodo>0;}).sort(function(a,b){return b.revenue-a.revenue;});
  var diasData=D.ventasPorDia||{},dias=Object.keys(diasData).sort();
  var mitad=Math.floor(dias.length/2),primera=dias.slice(0,mitad),segunda=dias.slice(mitad);
  var sumPrim=primera.reduce(function(s,d){return s+(diasData[d]?.facturacion||0);},0);
  var sumSeg=segunda.reduce(function(s,d){return s+(diasData[d]?.facturacion||0);},0);
  var tend=primera.length>0&&segunda.length>0?((sumSeg/segunda.length)-(sumPrim/primera.length))/(sumPrim/primera.length)*100:0;
  var proyFac30=Math.round((m.facturacion/Math.max(1,m.ventas))*m.ventas*(1+tend/100));
  var enRiesgo=FILTERED.filter(function(it){return it.promDiario>0&&it.diasStock<14&&it.diasStock>0;}).sort(function(a,b){return a.diasStock-b.diasStock;});

  document.getElementById('page').innerHTML=
    '<div class="ai-card"><div class="ai-title">✦ Análisis inteligente · Ganga Home</div>'+
    '<div class="ai-insight">Tendencia del período: <strong>'+(tend>=0?'▲ +':'')+tend.toFixed(1)+'%</strong> '+(tend>=0?'— ventas en crecimiento en la segunda mitad del período.':'— ventas en descenso en la segunda mitad.')+' </div>'+
    '<div class="ai-insight">Proyección próximos 30 días: <strong>'+fmtM(proyFac30)+'</strong> en facturación si la tendencia se mantiene.</div>'+
    '<div class="ai-insight"><strong>'+enRiesgo.length+' productos</strong> se quedan sin stock en menos de 14 días. '+(enRiesgo.length>0?'Más urgente: <strong>'+cleanT(enRiesgo[0].titulo).slice(0,30)+'</strong> ('+enRiesgo[0].diasStock+'d).':'Stock en buen estado.')+' </div>'+
    '<div style="margin-top:8px"><span class="ai-tag">📈 Tendencia: '+(tend>=0?'Positiva':'Negativa')+'</span><span class="ai-tag">⚠ En riesgo: '+enRiesgo.length+'</span><span class="ai-tag">💡 Oportunidades: '+oportunidades.length+'</span><span class="ai-tag">Conv: '+m.conversion.toFixed(1)+'%</span></div></div>'+
    '<div class="panel-grid">'+
    panel('⚠ Quiebre inminente','Stock < 14 días',
      enRiesgo.length===0?'<div class="empty">✓ Sin riesgo inmediato</div>':
      '<div style="padding:8px 12px">'+enRiesgo.slice(0,8).map(function(it){
        var u=it.diasStock<=3?'r':it.diasStock<=7?'o':'y';
        return '<div class="brow"><div class="blbl" style="width:170px">'+cleanT(it.titulo).slice(0,26)+'</div>'+pill(it.diasStock+'d',u)+'<div style="font-size:9.5px;color:var(--txt3);margin-left:4px;width:50px">'+fmt(it.stock)+'u</div></div>';
      }).join('')+'</div>')+
    panel('💡 Oportunidades','Alta venta + stock disponible',
      oportunidades.length===0?'<div class="empty">Sin oportunidades</div>':
      '<div style="padding:8px 12px">'+oportunidades.map(function(it,i){
        return '<div class="brow"><div class="blbl" style="width:190px">'+(i+1)+'. '+cleanT(it.titulo).slice(0,28)+'</div><div class="bval">'+fmtM(it.revenue)+'</div></div>';
      }).join('')+'</div>')+
    '</div>'+
    panel('Proyección de facturación','Datos reales + proyección estimada',
      '<div class="chart-wrap h200"><canvas id="ch-pred"></canvas></div>');

  var labels=dias.map(function(d){return d.slice(5);}),reales=dias.map(function(d){return Math.round(diasData[d]?.facturacion||0);});

  setTimeout(function(){
    var el=document.getElementById('ch-pred');if(!el)return;
    if(charts['ch-pred']){charts['ch-pred'].destroy();}
    charts['ch-pred']=new Chart(el,{type:'line',data:{labels:labels.concat(proyLabels),datasets:[

function rCompetidores() {

// COSTOS (cambio 10)
function rCostos() {
  if(!costosData){document.getElementById('page').innerHTML='<div class="loading-page"><div class="spinner"></div></div>';return;}
  var m=D.metricas;
  // Estimación de costos basada en la facturación
  var facturacion=m.facturacion||0;
  var cargosVenta=Math.round(facturacion*0.178); // ~17.8% comisión ML
  var costoEnvio=Math.round(facturacion*0.095);  // ~9.5% envíos
  var publicidad=Math.round(facturacion*0.045);  // ~4.5% ads
  var retenciones=Math.round(facturacion*0.033); // ~3.3%
  var percepciones=Math.round(facturacion*0.015);// ~1.5%
  var totalCostos=cargosVenta+costoEnvio+publicidad+retenciones+percepciones;
  var neto=facturacion-totalCostos;
  var margen=facturacion>0?(neto/facturacion*100):0;

  document.getElementById('page').innerHTML=
    '<div class="kg">'+
    kc('Ventas brutas',fmtM(facturacion),null,'yt')+
    kc('Total costos estimados',fmtM(totalCostos),{t:(totalCostos/facturacion*100).toFixed(1)+'% de las ventas',c:'ne'},'rt')+
    kc('Neto estimado',fmtM(neto),{t:'después de costos ML',c:neto>0?'up':'dn'},neto>0?'gt':'rt')+
    kc('Margen estimado',margen.toFixed(1)+'%',{t:'sobre ventas brutas',c:margen>20?'up':margen>10?'ne':'dn'},margen>20?'gt':margen>10?'':'rt')+
    '</div>'+
    '<div class="info-banner">📊 Los costos son <strong>estimaciones basadas en promedios de ML</strong>. Para valores exactos ver la sección de Facturación de ML.</div>'+
    panel('Distribución de costos','Estimación basada en tu facturación del período',
      '<div class="panel-grid">'+
      '<div style="padding:12px 14px">'+
      [['Cargos por venta (comisión)',cargosVenta,'r'],['Costos de envío',costoEnvio,'o'],['Inversión en publicidad',publicidad,'p'],['Retenciones',retenciones,'b'],['Percepciones',percepciones,'n']].map(function(c){
        var pct=facturacion>0?(c[1]/facturacion*100):0;
        return '<div class="brow"><div class="blbl" style="width:180px">'+c[0]+'</div><div class="btrk"><div class="bfil" style="width:'+pct.toFixed(0)+'%;background:var(--yd)"></div></div><div class="bval">'+fmtM(c[1])+'</div><div style="font-size:9.5px;color:var(--txt3);width:32px;text-align:right">'+pct.toFixed(1)+'%</div></div>';
      }).join('')+
      '</div>'+
      '<div class="chart-wrap h200"><canvas id="ch-costos"></canvas></div>'+
      '</div>');
  mkChart('ch-costos','doughnut',
    ['Cargos venta','Envío','Publicidad','Retenciones','Percepciones','Neto'],
    [{data:[cargosVenta,costoEnvio,publicidad,retenciones,percepciones,neto],backgroundColor:['#ef4444','#f97316','#7c3aed','#2563eb','#9ca3af','#16a34a'],borderWidth:2,borderColor:'var(--bg)'}],
    {plugins:{legend:{display:true,position:'right',labels:{color:'#4b5563',font:{size:9},boxWidth:10}}},scales:{x:{display:false},y:{display:false}}});
}

// FACTURACIÓN (cambio 12)
function rFacturacion() {
  if(!facturacionData){document.getElementById('page').innerHTML='<div class="loading-page"><div class="spinner"></div></div>';return;}
  var d=facturacionData;
  var facturas=Array.isArray(d)?d:d.results||d.invoices||[];
  if(!facturas.length){
    document.getElementById('page').innerHTML='<div class="empty">Sin facturas disponibles. Es posible que el endpoint de facturación de ML requiera permisos adicionales.</div>';
    return;
  }
  var rows=facturas.map(function(f,i){
    var estado=f.status||f.state||'—';
    var cls=estado==='paid'||estado==='pagado'?'g':'estado'==='pending'?'y':'n';
    return '<tr><td>'+(i+1)+'</td><td class="td-l"><span class="mono">'+(f.id||'—')+'</span></td><td class="td-l">'+(f.period||f.date||'—')+'</td><td>'+pill(estado,cls)+'</td><td class="g-txt">'+fmtM(f.total||f.amount||0)+'</td><td class="r-txt">'+fmtM(f.costs||0)+'</td><td class="b-txt">'+fmtM(f.net||0)+'</td></tr>';
  }).join('');
  document.getElementById('page').innerHTML=
    panel('Historial de facturas','Facturas de Mercado Libre',
      '<div class="tw"><table class="tbl"><thead><tr><th>#</th><th class="th-l">ID</th><th class="th-l">Período</th><th class="th-l">Estado</th><th>Total facturado</th><th>Costos ML</th><th>Neto</th></tr></thead><tbody>'+rows+'</tbody></table></div>');
}

    '</div>'+
    '<div class="kg">'+
    kc('Sin ventas (30d)',d.no_sales_pct?d.no_sales_pct+'%':'0%',{t:'mantener bajo 2%',c:d.no_sales_pct>2?'dn':'up'},d.no_sales_pct>2?'rt':'gt')+

    kc('Excede proyección',d.exceeds_projection_pct?d.exceeds_projection_pct+'%':'0%',{t:'mantener bajo 8%',c:d.exceeds_projection_pct>8?'dn':'up'},d.exceeds_projection_pct>8?'rt':'gt')+

      '</div>');
}

// REPUTACIÓN (cambio 7)
function rReputacion() {
  var rep=D.reputacion||{};
  var names={'5_green':'Verde (excelente)','4_light_green':'Verde claro','3_yellow':'Amarillo','2_orange':'Naranja','1_red':'Rojo (crítico)'};
  var pcts={'5_green':100,'4_light_green':80,'3_yellow':60,'2_orange':40,'1_red':20};
  var colors={'5_green':'var(--g)','4_light_green':'#84cc16','3_yellow':'#eab308','2_orange':'#f97316','1_red':'var(--r)'};
  var name=names[rep.nivel]||rep.nivel||'—',isGood=rep.nivel==='5_green'||rep.nivel==='4_light_green';
  var m=D.metricas;

  document.getElementById('page').innerHTML=
    '<div class="kg">'+
    kc('Nivel de reputación',name,null,isGood?'gt':'rt')+
    kc('Tasa de reclamos',rep.reclamos>0?(rep.reclamos*100).toFixed(2)+'%':'0%',{t:rep.reclamosMalo?'⚠ Sobre límite (>2%)':'✓ Sin reclamos',c:rep.reclamosMalo?'dn':'up'},rep.reclamosMalo?'rt':'gt')+
    kc('Tasa cancelaciones',rep.cancelaciones>0?(rep.cancelaciones*100).toFixed(2)+'%':'0%',{t:rep.cancelacMalo?'⚠ Sobre límite (>5%)':'✓ Sin cancelaciones',c:rep.cancelacMalo?'dn':'up'},rep.cancelacMalo?'rt':'gt')+
    kc('Demoras en despacho',rep.demoras>0?(rep.demoras*100).toFixed(2)+'%':'0%',{t:rep.demorasMalo?'⚠ Con demoras (>10%)':'✓ Sin demoras',c:rep.demorasMalo?'dn':'up'},rep.demorasMalo?'rt':'gt')+
    '</div>'+
    // Termómetro
    '<div class="panel"><div class="ph"><div><div class="pt">Termómetro de reputación</div></div></div>'+
    '<div style="padding:16px 18px">'+
    '<div style="font-size:26px;font-weight:800;color:'+(colors[rep.nivel]||'var(--txt)')+'">'+name+'</div>'+
    '<div class="rep-meter"><div class="rep-fill" style="width:'+(pcts[rep.nivel]||0)+'%;background:'+(colors[rep.nivel]||'var(--txt)')+'"></div></div>'+
    '<div style="display:flex;justify-content:space-between;max-width:280px;margin-top:3px;font-size:9px;color:var(--txt3)"><span>Crítico</span><span>Excelente</span></div>'+
    '</div></div>'+
    // Detalle con métricas de ventas (cambio 7)
    '<div class="panel-grid">'+
    panel('Métricas que afectan la reputación','Umbrales de Mercado Libre · con contexto de ventas',
      '<div class="tw"><table class="tbl"><thead><tr><th class="th-l">Métrica</th><th class="th-l">Umbral</th><th class="th-l">Tu valor</th><th class="th-l">Estado</th><th>Ventas afectadas (est.)</th></tr></thead><tbody>'+
      repRow('Reclamos','≤ 2%',rep.reclamos>0?(rep.reclamos*100).toFixed(2)+'%':'0%',!rep.reclamosMalo,Math.round(m.ventas*(rep.reclamos||0)))+
      repRow('Cancelaciones','≤ 5%',rep.cancelaciones>0?(rep.cancelaciones*100).toFixed(2)+'%':'0%',!rep.cancelacMalo,Math.round(m.ventas*(rep.cancelaciones||0)))+
      repRow('Demoras','≤ 10%',rep.demoras>0?(rep.demoras*100).toFixed(2)+'%':'0%',!rep.demorasMalo,Math.round(m.ventas*(rep.demoras||0)))+
      '</tbody></table></div>')+
    panel('Contexto de ventas del período','Para interpretar los indicadores',
      '<div style="padding:12px 14px">'+
      '<div style="font-size:11px;color:var(--txt2);margin-bottom:6px">Total de ventas del período: <strong class="g-txt">'+fmt(m.ventas)+'</strong></div>'+
      '<div style="font-size:11px;color:var(--txt2);margin-bottom:6px">Facturación: <strong>'+fmtM(m.facturacion)+'</strong></div>'+
      '<div style="font-size:11px;color:var(--txt2);margin-bottom:6px">Ticket promedio: <strong>'+fmtP(m.ticketPromedio)+'</strong></div>'+
      '<div style="font-size:11px;color:var(--txt2)">Conversión: <strong>'+m.conversion.toFixed(1)+'%</strong></div>'+
      ((!rep.reclamosMalo&&!rep.cancelacMalo&&!rep.demorasMalo)?
        '<div class="ok-banner" style="margin-top:10px">✓ Tu cuenta está en estado óptimo. Sin indicadores negativos.</div>':
        '<div class="warn-banner" style="margin-top:10px">⚠ Hay métricas que pueden afectar tu posicionamiento.</div>')+
      '</div>')+
    '</div>';
}

function repRow(label,limite,valor,ok,afectadas){
  var afectadasStr=afectadas>0?
    '<span class="o-txt">'+fmt(afectadas)+' ventas est.</span>':
    '<span class="ne">0 ventas</span>';
  return '<tr><td class="td-l" style="font-weight:600">'+label+'</td>'+
    '<td class="td-l"><span class="mono">'+limite+'</span></td>'+
    '<td class="td-l" style="font-weight:700;color:'+(ok?'var(--g)':'var(--r)')+'">'+valor+'</td>'+
    '<td class="td-l">'+pill(ok?'✓ OK':'⚠ Revisar',ok?'g':'r')+'</td>'+
    '<td class="td-l">'+afectadasStr+'</td></tr>';
}

document.addEventListener('DOMContentLoaded',function(){
  var hoy=new Date(),desde=new Date(hoy);
  desde.setDate(desde.getDate()-30);
  document.getElementById('f-desde').value=desde.toISOString().split('T')[0];
  document.getElementById('f-hasta').value=hoy.toISOString().split('T')[0];
  renderTabs();
  loadData();
      // Auto-refresh cada 5 minutos (polling fallback)
  setInterval(function(){
    loadData();
    loadEnvios();
  }, 5 * 60 * 1000);
});
