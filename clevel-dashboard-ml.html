<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard C-Level — Ganga Home</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#fff;--bg2:#f7f8fa;--bg3:#f0f2f5;--bg4:#e4e7ec;
  --border:#e0e3e8;--border2:#cdd0d6;
  --txt:#111827;--txt2:#4b5563;--txt3:#9ca3af;--txt4:#d1d5db;
  --y:#ffe600;--yd:#c8b400;--ybg:#fffce0;--yb:#f0e000;
  --g:#16a34a;--gbg:#f0fdf4;--gb:#bbf7d0;
  --r:#dc2626;--rbg:#fef2f2;--rb:#fecaca;
  --b:#2563eb;--bbg:#eff6ff;--bbo:#bfdbfe;
  --o:#ea580c;--obg:#fff7ed;--ob:#fed7aa;
  --p:#7c3aed;--pbg:#f5f3ff;--pb:#ddd6fe;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 16px rgba(0,0,0,.09),0 2px 6px rgba(0,0,0,.05);
  --radius:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg2);color:var(--txt)}
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ─────────────────────────────────────── */
.sidebar{width:224px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.logo-wrap{padding:16px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-ico{width:36px;height:36px;background:var(--y);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(200,180,0,.3)}
.logo-ico svg{width:20px;height:20px}
.logo-name{font-size:13.5px;font-weight:800;color:var(--txt);letter-spacing:-.03em;line-height:1.2}
.logo-sub{font-size:9.5px;color:var(--txt3);letter-spacing:.01em}
.nav{flex:1;padding:8px 8px;overflow-y:auto}
.nsec{font-size:9px;font-weight:700;color:var(--txt4);letter-spacing:.12em;text-transform:uppercase;padding:10px 8px 3px}
.ni{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--txt2);margin-bottom:1px;border:none;background:none;width:100%;text-align:left;transition:all .12s;font-family:var(--font);font-weight:500;position:relative}
.ni:hover{background:var(--bg2);color:var(--txt)}
.ni.active{background:var(--y);color:#111;font-weight:700;box-shadow:0 1px 4px rgba(200,180,0,.2)}
.ni svg{flex-shrink:0;width:14px;height:14px;opacity:.8}
.ni.active svg{opacity:1}
.nbadge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:1px 6px;border-radius:20px;margin-left:auto;flex-shrink:0}
.nbadge.r{background:var(--rbg);color:var(--r);border:1px solid var(--rb)}
.nbadge.g{background:var(--gbg);color:var(--g);border:1px solid var(--gb)}
.sfoot{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0}
.sfoot-sync{font-size:10px;color:var(--txt3);line-height:1.6}
.sfoot-sync strong{color:var(--txt2);font-weight:600}
.dbprogress{margin-top:6px;background:var(--bg3);border-radius:4px;height:4px;overflow:hidden}
.dbfill{height:4px;border-radius:4px;background:var(--y);transition:width .5s}

/* ── MAIN ─────────────────────────────────────────── */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}

/* TOPBAR */
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.topbar-l h2{font-size:15px;font-weight:700;color:var(--txt);letter-spacing:-.02em}
.topbar-l p{font-size:10.5px;color:var(--txt3);margin-top:1px}
.topbar-r{display:flex;align-items:center;gap:7px;flex-shrink:0}
.conn-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:10.5px;font-weight:600;transition:all .3s}
.conn-badge.ok{background:var(--gbg);border:1px solid var(--gb);color:var(--g)}
.conn-badge.loading{background:var(--ybg);border:1px solid var(--yb);color:#856400}
.conn-badge.error{background:var(--rbg);border:1px solid var(--rb);color:var(--r)}
.cdot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.tbtn{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:var(--font);color:var(--txt2);font-weight:600;transition:all .12s;white-space:nowrap}
.tbtn:hover{background:var(--bg3);color:var(--txt)}
.tbtn.primary{background:var(--y);border-color:var(--yd);color:#111;font-weight:700}
.tbtn.primary:hover{background:#f5dc00}

/* FILTER BAR */
.fbar{background:var(--bg);border-bottom:1px solid var(--border);padding:7px 16px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0}
.flbl{font-size:9.5px;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.fsep{width:1px;height:18px;background:var(--border);margin:0 1px;flex-shrink:0}
.fsearch{position:relative}
.fsearch svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none;width:12px;height:12px}
.fsearch input{padding-left:26px;width:160px}
input[type=text],input[type=date],select{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--txt);font-size:11px;font-family:var(--font);padding:4px 8px;outline:none;transition:border .12s;height:26px}
input[type=text]:focus,input[type=date]:focus,select:focus{border-color:var(--yd);background:var(--bg);box-shadow:0 0 0 2px rgba(200,180,0,.12)}
.prange{display:flex;align-items:center;gap:4px}
.prange span{font-size:10px;color:var(--txt3)}
.qbtn{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--txt2);font-size:10.5px;font-family:var(--font);padding:4px 10px;cursor:pointer;transition:all .12s;font-weight:500;height:26px;white-space:nowrap}
.qbtn:hover{border-color:var(--border2);color:var(--txt)}
.qbtn.active{background:var(--ybg);border-color:var(--yd);color:#856400;font-weight:700}
.fclr{font-size:10px;color:var(--txt3);cursor:pointer;padding:3px 7px;border-radius:4px;border:none;background:none;font-family:var(--font);transition:color .12s}
.fclr:hover{color:var(--r)}
.fcount{font-size:10px;color:var(--txt3);margin-left:auto;white-space:nowrap;flex-shrink:0}

/* CHIPS */
.chips-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:4px 16px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;min-height:0}
.chips-bar:empty{display:none;border-bottom:none;padding:0}
.chip{display:inline-flex;align-items:center;gap:3px;background:var(--ybg);border:1px solid var(--yb);border-radius:20px;padding:2px 8px;font-size:9.5px;color:#856400;font-weight:600}
.chipx{cursor:pointer;opacity:.6;margin-left:1px;font-size:10px}
.chipx:hover{opacity:1;color:var(--r)}

/* SUBTABS */
.subtabs{background:var(--bg);border-bottom:1px solid var(--border);padding:0 18px;display:flex;gap:1px;overflow-x:auto;flex-shrink:0}
.stab{padding:8px 15px;font-size:11.5px;font-weight:500;color:var(--txt3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;font-family:var(--font)}
.stab.active{color:var(--txt);border-bottom-color:var(--yd);font-weight:700}
.stab:hover:not(.active){color:var(--txt2)}

/* PAGE */
.page{flex:1;overflow-y:auto;padding:16px 18px;background:var(--bg2)}

/* ── KPI CARDS ────────────────────────────────────── */
.kg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:12px}
.kg3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:12px}
.kg2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:12px}
.kc{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;box-shadow:var(--sh);border-top:3px solid transparent;transition:box-shadow .15s;position:relative;overflow:hidden}
.kc:hover{box-shadow:var(--shm)}
.kc.yt{border-top-color:var(--y)}.kc.gt{border-top-color:var(--g)}.kc.rt{border-top-color:var(--r)}.kc.bt{border-top-color:var(--b)}.kc.ot{border-top-color:var(--o)}.kc.pt{border-top-color:var(--p)}
.kl{font-size:9.5px;color:var(--txt3);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.kv{font-size:21px;font-weight:800;color:var(--txt);line-height:1.1;letter-spacing:-.03em}
.kv.sm{font-size:17px}
.ks{font-size:10.5px;margin-top:4px;font-weight:600;display:flex;align-items:center;gap:3px}
.up{color:var(--g)}.dn{color:var(--r)}.ne{color:var(--txt3)}
.kdelta{position:absolute;top:10px;right:12px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:12px}
.kdelta.up{background:var(--gbg);color:var(--g)}
.kdelta.dn{background:var(--rbg);color:var(--r)}

/* ── PANEL ────────────────────────────────────────── */
.panel{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;box-shadow:var(--sh)}
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.panel-grid .panel{margin-bottom:0}
.ph{padding:11px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;flex-shrink:0}
.pt{font-size:12.5px;font-weight:700;color:var(--txt)}
.ps{font-size:10.5px;color:var(--txt3);margin-top:1px}
.ph-r{display:flex;align-items:center;gap:7px}

/* ── TABLE ────────────────────────────────────────── */
.tw{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:11.5px}
.tbl th{font-size:9.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg2);text-align:right;white-space:nowrap;font-weight:700;user-select:none}
.tbl th:nth-child(1){text-align:center;width:32px}
.tbl th:nth-child(2){text-align:left}
.tbl th.th-l{text-align:left}
.tbl td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--txt);text-align:right;vertical-align:middle}
.tbl td:nth-child(1){text-align:center;color:var(--txt3);font-size:10.5px}
.tbl td:nth-child(2){text-align:left}
.tbl td.td-l{text-align:left}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg2)}
.tfoot{padding:8px 14px;border-top:1px solid var(--border);font-size:10.5px;color:var(--txt3);display:flex;align-items:center;justify-content:space-between}

/* ── PILLS ────────────────────────────────────────── */
.pill{display:inline-flex;align-items:center;font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:20px}
.pill.g{background:var(--gbg);color:var(--g);border:1px solid var(--gb)}
.pill.r{background:var(--rbg);color:var(--r);border:1px solid var(--rb)}
.pill.y{background:var(--ybg);color:#856400;border:1px solid var(--yb)}
.pill.b{background:var(--bbg);color:var(--b);border:1px solid var(--bbo)}
.pill.n{background:var(--bg3);color:var(--txt3);border:1px solid var(--border)}
.pill.o{background:var(--obg);color:var(--o);border:1px solid var(--ob)}
.pill.p{background:var(--pbg);color:var(--p);border:1px solid var(--pb)}

/* ── MISC ─────────────────────────────────────────── */
.mono{font-family:var(--mono);font-size:10px;color:var(--txt3)}
.pname{font-size:11.5px;font-weight:600;color:var(--txt);line-height:1.3}
.g-txt{color:var(--g);font-weight:600}.r-txt{color:var(--r);font-weight:600}
.y-txt{color:#856400;font-weight:600}.b-txt{color:var(--b);font-weight:600}
.o-txt{color:var(--o);font-weight:600}.p-txt{color:var(--p);font-weight:600}

.chart-wrap{position:relative;width:100%;padding:12px 14px}
.chart-wrap.h180{height:180px}.chart-wrap.h220{height:220px}.chart-wrap.h280{height:280px}

.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--yd);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:36px;color:var(--txt3);font-size:12.5px}

.vtag{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;color:var(--txt2);margin:2px 2px 0 0;white-space:nowrap;line-height:1.3}
.vs-ok{color:var(--g);font-weight:700}.vs-lo{color:#856400;font-weight:700}.vs-no{color:var(--r);font-weight:700}

.info-banner{display:flex;align-items:flex-start;gap:8px;background:var(--ybg);border:1px solid var(--yb);border-radius:8px;padding:9px 13px;font-size:11px;color:#856400;margin-bottom:12px;line-height:1.5}
.warn-banner{display:flex;align-items:flex-start;gap:8px;background:var(--rbg);border:1px solid var(--rb);border-radius:8px;padding:9px 13px;font-size:11px;color:var(--r);margin-bottom:12px;line-height:1.5}
.ok-banner{display:flex;align-items:flex-start;gap:8px;background:var(--gbg);border:1px solid var(--gb);border-radius:8px;padding:9px 13px;font-size:11px;color:var(--g);margin-bottom:12px;line-height:1.5}

/* AI / ML styles */
.ai-card{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border:1px solid #0f3460;border-radius:var(--radius);padding:14px 16px;color:#fff;margin-bottom:12px;position:relative;overflow:hidden}
.ai-card::before{content:'✦';position:absolute;top:10px;right:14px;font-size:18px;opacity:.3;animation:twinkle 3s infinite}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:.7}}
.ai-title{font-size:11px;font-weight:700;color:#a78bfa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ai-insight{font-size:12.5px;color:#e2e8f0;line-height:1.6;margin-bottom:6px}
.ai-insight strong{color:#fde68a}
.ai-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.3);border-radius:6px;padding:3px 8px;font-size:10px;color:#c4b5fd;font-weight:600;margin:3px 3px 0 0}

/* PROGRESS BARS */
.brow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.blbl{font-size:11px;color:var(--txt2);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btrk{flex:1;background:var(--bg3);border-radius:3px;height:7px;overflow:hidden;min-width:60px}
.bfil{height:7px;border-radius:3px}
.bval{font-size:11px;font-weight:700;color:var(--txt);width:80px;text-align:right;flex-shrink:0}

/* SCATTER/HEATMAP */
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:12px 14px}
.hcell{border-radius:4px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:rgba(255,255,255,.8);cursor:default;transition:transform .12s}
.hcell:hover{transform:scale(1.1)}

/* REP METER */
.rep-meter{height:12px;border-radius:6px;background:var(--bg3);overflow:hidden;margin-top:8px;max-width:320px}
.rep-fill{height:100%;border-radius:6px;transition:width .6s}

select option{background:var(--bg);color:var(--txt)}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo-wrap">
    <div class="logo-ico">
      <svg viewBox="0 0 24 24" fill="none">
        <rect width="24" height="24" rx="5" fill="#111"/>
        <path d="M6 12l4 4 8-8" stroke="#ffe600" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">Ganga Home</div>
      <div class="logo-sub">C-Level · Mercado Libre</div>
    </div>
  </div>

  <div class="nav">
    <div class="nsec">Negocio</div>
    <button class="ni active" onclick="go('resumen',this)">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Resumen Ejecutivo
    </button>
    <button class="ni" onclick="go('ventas',this)">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Evolución de Ventas
    </button>
    <button class="ni" onclick="go('productos',this)">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      Productos & Stock
    </button>
    <button class="ni" onclick="go('alertas',this)">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Alertas de Stock
      <span class="nbadge r" id="badge-alertas">0</span>
    </button>

    <div class="nsec">Analítica</div>
    <button class="ni" onclick="go('horario',this)">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Análisis Horario
    </button>
    <button class="ni" onclick="go('comparar',this)">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Comparar Períodos
    </button>
    <button class="ni" onclick="go('prediccion',this)">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/><path d="M13 10h-3m0 3h3"/></svg>
      IA & Predicciones
    </button>

    <div class="nsec">Cuenta</div>
    <button class="ni" onclick="go('reputacion',this)">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Reputación
    </button>
  </div>

  <div class="sfoot">
    <div class="sfoot-sync" id="sfoot">
      <div class="cdot pulse" style="display:inline-block;margin-right:5px;background:var(--txt3)"></div>
      Cargando...
    </div>
    <div class="dbprogress" id="dbprogress" style="display:none">
      <div class="dbfill" id="dbfill" style="width:0%"></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-l">
      <h2 id="main-title">Resumen Ejecutivo</h2>
      <p id="main-sub">Indicadores clave · Mercado Libre</p>
    </div>
    <div class="topbar-r">
      <div class="conn-badge loading" id="conn-badge">
        <div class="cdot pulse"></div>
        <span id="conn-txt">Cargando...</span>
      </div>
      <button class="tbtn" onclick="loadData()">↻ Actualizar</button>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="fbar">
    <span class="flbl">Filtros</span>
    <div class="fsearch">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="f-q" placeholder="Buscar producto..." oninput="applyFilters()">
    </div>
    <div class="fsep"></div>
    <span class="flbl">Período:</span>
    <div class="prange">
      <input type="date" id="f-desde" onchange="applyFilters()">
      <span>al</span>
      <input type="date" id="f-hasta" onchange="applyFilters()">
    </div>
    <button class="qbtn" onclick="setRange(7,this)" id="btn-7">7d</button>
    <button class="qbtn active" onclick="setRange(30,this)" id="btn-30">30d</button>
    <button class="qbtn" onclick="setRange(60,this)" id="btn-60">60d</button>
    <button class="qbtn" onclick="setRange(90,this)" id="btn-90">90d</button>
    <button class="qbtn" onclick="setRange(0,this)" id="btn-todo">Todo</button>
    <div class="fsep"></div>
    <select id="f-cat" onchange="applyFilters()">
      <option value="">Categoría: Todas</option>
      <option value="cubre">Cubre Edredón / Dubai</option>
      <option value="acolchados">Acolchados</option>
      <option value="sabanas">Sábanas</option>
      <option value="toallas">Toallas</option>
      <option value="mantas">Mantas / Pie de cama</option>
      <option value="manteles">Manteles</option>
      <option value="cortinas">Cortinas</option>
      <option value="cubrecama">Cubrecama</option>
      <option value="edredones">Edredones</option>
      <option value="frazadas">Frazadas</option>
      <option value="deco">Deco & Hogar</option>
    </select>
    <select id="f-estado" onchange="applyFilters()">
      <option value="">Stock: Todos</option>
      <option value="critico">Crítico (0)</option>
      <option value="bajo">Bajo (&lt;10)</option>
      <option value="ok">OK</option>
    </select>
    <button class="fclr" onclick="clearFilters()">✕ Limpiar</button>
    <span class="fcount" id="f-count"></span>
  </div>

  <!-- CHIPS -->
  <div class="chips-bar" id="chips-bar"></div>

  <!-- SUBTABS -->
  <div class="subtabs" id="subtabs"></div>

  <!-- PAGE -->
  <div class="page" id="page">
    <div style="text-align:center;padding:60px 20px">
      <div class="spinner"></div>
      <p style="color:var(--txt3);font-size:13px;margin-top:14px">Conectando con la base de datos histórica...</p>
    </div>
  </div>
</div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────
var WORKER = 'https://ganga-worker.gangahome.workers.dev';

// ─── ESTADO ──────────────────────────────────────────────────────────
var D = null;        // datos del /data endpoint
var ALL = [];        // todos los stockItems enriquecidos
var FILTERED = [];   // stockItems filtrados
var charts = {};
var curNav = 'resumen';
var curSub = 0;
var gF = { q:'', desde:'', hasta:'', cat:'', estado:'' };
var compD = null;    // datos del período de comparación

var PAGES = {
  resumen:    { title:'Resumen Ejecutivo',     sub:'Indicadores clave del período · Mercado Libre',   tabs:['Métricas','Top Productos','Mapa de calor'] },
  ventas:     { title:'Evolución de Ventas',   sub:'Facturación y unidades vendidas por día',          tabs:['Gráfico diario','Ranking de productos'] },
  productos:  { title:'Productos & Stock',     sub:'Catálogo completo con variantes y análisis',       tabs:['Todos los productos','Por categoría'] },
  alertas:    { title:'Alertas de Stock',      sub:'Productos críticos y con reposición urgente',      tabs:['Críticos','Stock bajo','Todo el inventario'] },
  horario:    { title:'Análisis Horario',      sub:'Patrones de venta por hora y día de la semana',    tabs:['Por hora','Por día de semana'] },
  comparar:   { title:'Comparar Períodos',     sub:'Análisis comparativo entre dos períodos',          tabs:['Comparación'] },
  prediccion: { title:'IA & Predicciones',     sub:'Análisis inteligente y proyecciones de ventas',    tabs:['Insights IA','Proyección de stock'] },
  reputacion: { title:'Reputación',            sub:'Estado de la cuenta en Mercado Libre',             tabs:['Estado de cuenta'] },
};

// ─── CARGA DE DATOS ───────────────────────────────────────────────────
async function loadData() {
  setConn('loading','Cargando...');
  var desde = document.getElementById('f-desde').value;
  var hasta  = document.getElementById('f-hasta').value;
  var url    = WORKER + '/data';
  if (desde || hasta) {
    var params = [];
    if (desde) params.push('desde=' + desde);
    if (hasta) params.push('hasta=' + hasta);
    url += '?' + params.join('&');
  }
  try {
    var res = await fetch(url + (url.includes('?') ? '&' : '?') + '_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    D = await res.json();
    if (D.error) throw new Error(D.error);

    // Verificar que hay datos reales
    var totalOrd = D.metricas?.ventas || 0;
    if (totalOrd === 0 && !D.stockItems?.length) throw new Error('Sin datos. La DB se está llenando — intentá en unos minutos.');

    processData();
    setConn('ok', 'Actualizado · ' + new Date(D.syncedAt).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}));
    updateSfoot();
  } catch(e) {
    setConn('error', 'Error');
    showErr(e.message);
  }
}

function processData() {
  var stockData = D.stockItems || [];
  ALL = stockData.map(function(it) {
    var revenue = it.facturacion || Math.round((it.unidsPeriodo||0) * it.precio);
    return Object.assign({}, it, {
      cat:    detectCat(it.titulo),
      estado: detectEstado(it),
      revenue: revenue,
    });
  });

  var nCrit = ALL.filter(function(it){ return it.estado === 'critico'; }).length;
  document.getElementById('badge-alertas').textContent = nCrit;
  document.getElementById('badge-alertas').className = 'nbadge ' + (nCrit > 0 ? 'r' : 'g');

  // Fechas por defecto del período
  if (D.periodo) {
    if (!document.getElementById('f-desde').value)
      document.getElementById('f-desde').value = D.periodo.desde;
    if (!document.getElementById('f-hasta').value)
      document.getElementById('f-hasta').value = D.periodo.hasta;
  }

  applyFilters();
}

function updateSfoot() {
  if (!D) return;
  var sync = new Date(D.syncedAt).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  document.getElementById('sfoot').innerHTML =
    '<span style="color:var(--g);font-weight:700">●</span> Sync: <strong>' + sync + '</strong><br>' +
    D.periodo.desde + ' → ' + D.periodo.hasta + ' · ' + D.periodo.dias + 'd<br>' +
    '<span style="color:var(--txt3)">' + D.muestreo + '</span>';
}

function setConn(s, t) {
  var b = document.getElementById('conn-badge'), dot = b.querySelector('.cdot');
  b.className = 'conn-badge ' + s;
  dot.className = 'cdot' + (s === 'loading' ? ' pulse' : '');
  document.getElementById('conn-txt').textContent = t;
}

function showErr(msg) {
  document.getElementById('page').innerHTML =
    '<div style="padding:24px;max-width:520px;margin:0 auto">' +
    '<div class="warn-banner"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
    '<div><strong>Error:</strong> ' + msg + '<br><br>' +
    '<button onclick="loadData()" class="tbtn primary" style="margin-right:6px">↻ Reintentar</button>' +
    '</div></div></div>';
}

// ─── CATEGORÍAS ───────────────────────────────────────────────────────
function detectCat(t) {
  var tl = t.toLowerCase();
  if (tl.includes('dubai') || tl.includes('cubre edred') || tl.includes('moscu') || tl.includes('moscú')) return 'cubre';
  if (tl.includes('acolchado')) return 'acolchados';
  if (tl.includes('saban') || tl.includes('sábana') || tl.includes('juego de sab')) return 'sabanas';
  if (tl.includes('toall')) return 'toallas';
  if (tl.includes('manta') || tl.includes('pie de cama') || tl.includes('cubre sill')) return 'mantas';
  if (tl.includes('mantel')) return 'manteles';
  if (tl.includes('cortina')) return 'cortinas';
  if (tl.includes('cubrecama')) return 'cubrecama';
  if (tl.includes('edredon') || tl.includes('edredón') || tl.includes('marbella') || tl.includes('atenas')) return 'edredones';
  if (tl.includes('frazada')) return 'frazadas';
  return 'deco';
}

var CAT_NAMES = {
  cubre:'Cubre Edredón',acolchados:'Acolchados',sabanas:'Sábanas',
  toallas:'Toallas',mantas:'Mantas / Pie de cama',manteles:'Manteles',
  cortinas:'Cortinas',cubrecama:'Cubrecama',edredones:'Edredones',
  frazadas:'Frazadas',deco:'Deco & Hogar'
};

function detectEstado(it) {
  if (!it.stock) return 'critico';
  if (it.stock < 10) return 'bajo';
  return 'ok';
}

// ─── FILTROS ──────────────────────────────────────────────────────────
function setRange(dias, btn) {
  document.querySelectorAll('.qbtn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  var hoy = new Date(), desde = new Date(hoy);
  if (dias > 0) {
    desde.setDate(desde.getDate() - dias);
    document.getElementById('f-desde').value = desde.toISOString().split('T')[0];
    document.getElementById('f-hasta').value = hoy.toISOString().split('T')[0];
  } else {
    document.getElementById('f-desde').value = '';
    document.getElementById('f-hasta').value = '';
  }
  loadData(); // recarga desde la DB con nuevo rango
}

function applyFilters() {
  gF.q      = document.getElementById('f-q').value.toLowerCase().trim();
  gF.desde  = document.getElementById('f-desde').value;
  gF.hasta  = document.getElementById('f-hasta').value;
  gF.cat    = document.getElementById('f-cat').value;
  gF.estado = document.getElementById('f-estado').value;

  FILTERED = ALL.filter(function(it) {
    if (gF.q && !it.titulo.toLowerCase().includes(gF.q)) return false;
    if (gF.cat && it.cat !== gF.cat) return false;
    if (gF.estado && it.estado !== gF.estado) return false;
    return true;
  });

  document.getElementById('f-count').textContent = FILTERED.length + ' de ' + ALL.length + ' productos';
  renderChips();
  renderPage();
}

function renderChips() {
  var chips = [];
  if (gF.q) chips.push({l:'Búsqueda: "' + gF.q + '"', k:'q'});
  if (gF.cat) chips.push({l:'Cat: ' + (CAT_NAMES[gF.cat] || gF.cat), k:'cat'});
  if (gF.estado) chips.push({l:'Stock: ' + gF.estado, k:'estado'});
  if (gF.desde && gF.hasta) chips.push({l:gF.desde + ' → ' + gF.hasta, k:'fecha'});
  document.getElementById('chips-bar').innerHTML = chips.map(function(c) {
    return '<span class="chip">' + c.l + '<span class="chipx" onclick="clearFilter(\'' + c.k + '\')">×</span></span>';
  }).join('');
}

function clearFilter(k) {
  if (k === 'q')     { document.getElementById('f-q').value = '';  gF.q = ''; }
  if (k === 'cat')   { document.getElementById('f-cat').value = '';    gF.cat = ''; }
  if (k === 'estado'){ document.getElementById('f-estado').value = ''; gF.estado = ''; }
  if (k === 'fecha') {
    document.getElementById('f-desde').value = D?.periodo?.desde || '';
    document.getElementById('f-hasta').value = D?.periodo?.hasta || '';
    loadData();
    return;
  }
  applyFilters();
}

function clearFilters() {
  document.getElementById('f-q').value = '';
  document.getElementById('f-cat').value = '';
  document.getElementById('f-estado').value = '';
  document.querySelectorAll('.qbtn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('btn-30').classList.add('active');
  gF = {q:'',desde:'',hasta:'',cat:'',estado:''};
  loadData();
}

// ─── NAV ──────────────────────────────────────────────────────────────
function go(key, btn) {
  document.querySelectorAll('.ni').forEach(function(n){ n.classList.remove('active'); });
  btn.classList.add('active');
  curNav = key; curSub = 0;
  var p = PAGES[key];
  document.getElementById('main-title').textContent = p.title;
  document.getElementById('main-sub').textContent   = p.sub;
  renderTabs();
  renderPage();
}

function renderTabs() {
  document.getElementById('subtabs').innerHTML = PAGES[curNav].tabs.map(function(t, i) {
    return '<button class="stab' + (i === 0 ? ' active' : '') + '" onclick="showSub(' + i + ',this)">' + t + '</button>';
  }).join('');
}

function showSub(i, btn) {
  document.querySelectorAll('.stab').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  curSub = i;
  renderPage();
}

function renderPage() {
  if (!D) return;
  var map = {
    resumen:    [rResumen,    rTopProd,     rHeatmap],
    ventas:     [rVentasDia,  rVentasRank],
    productos:  [rProductos,  rPorCat],
    alertas:    [rCriticos,   rBajo,        rInventario],
    horario:    [rPorHora,    rPorDiaSemana],
    comparar:   [rComparar],
    prediccion: [rPrediccion, rStockPred],
    reputacion: [rReputacion],
  };
  var fns = map[curNav];
  if (fns && fns[curSub]) fns[curSub]();
}

// ─── HELPERS ──────────────────────────────────────────────────────────
var fmt  = function(n){ return Math.round(n).toLocaleString('es-AR'); };
var fmtP = function(n){ return '$ ' + Math.round(n).toLocaleString('es-AR'); };
var fmtM = function(n){
  if (n >= 1e9) return '$ ' + (n/1e9).toFixed(2).replace('.',',') + 'B';
  if (n >= 1e6) return '$ ' + (n/1e6).toFixed(2).replace('.',',') + 'M';
  if (n >= 1e3) return '$ ' + Math.round(n/1000).toLocaleString('es-AR') + 'k';
  return fmtP(n);
};
var pct = function(n){ return n >= 0 ? '+' + n.toFixed(1) + '%' : n.toFixed(1) + '%'; };

function cleanT(t) {
  return t.replace(/ \| Ganga Home.*/,'').replace(/ \| Tommy Hilfiger.*/,'');
}
function pill(t, c) { return '<span class="pill ' + c + '">' + t + '</span>'; }
function kc(l, v, sc, cls, delta) {
  return '<div class="kc ' + (cls||'') + '">' +
    (delta !== undefined ? '<div class="kdelta ' + (delta >= 0 ? 'up' : 'dn') + '">' + (delta >= 0 ? '▲' : '▼') + ' ' + Math.abs(delta).toFixed(1) + '%</div>' : '') +
    '<div class="kl">' + l + '</div>' +
    '<div class="kv">' + (v || '—') + '</div>' +
    (sc ? '<div class="ks ' + (sc.c||'ne') + '">' + sc.t + '</div>' : '') +
    '</div>';
}
function panel(title, sub, body, right) {
  return '<div class="panel"><div class="ph"><div><div class="pt">' + title + '</div>' +
    (sub ? '<div class="ps">' + sub + '</div>' : '') + '</div>' +
    (right ? '<div class="ph-r">' + right + '</div>' : '') + '</div>' + body + '</div>';
}
function mkChart(id, type, labels, datasets, opts) {
  setTimeout(function(){
    var el = document.getElementById(id); if(!el) return;
    if (charts[id]) { charts[id].destroy(); delete charts[id]; }
    charts[id] = new Chart(el, {
      type: type,
      data: { labels: labels, datasets: datasets },
      options: Object.assign({
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid:{ color:'rgba(0,0,0,.04)' }, ticks:{ color:'#9ca3af', font:{size:10} } },
          y: { grid:{ color:'rgba(0,0,0,.04)' }, ticks:{ color:'#9ca3af', font:{size:10} } }
        }
      }, opts || {})
    });
  }, 60);
}

// ─── RESUMEN EJECUTIVO ────────────────────────────────────────────────
function rResumen() {
  var m   = D.metricas;
  var rep = D.reputacion || {};
  var data = FILTERED;

  var totalFact  = data.reduce(function(s,it){ return s + (it.facturacion||0); }, 0);
  var totalUds   = data.reduce(function(s,it){ return s + (it.unidsPeriodo||0); }, 0);
  var sinStock   = data.filter(function(it){ return it.estado === 'critico'; }).length;
  var totalStock = data.reduce(function(s,it){ return s + (it.stock||0); }, 0);
  var conVentas  = data.filter(function(it){ return it.unidsPeriodo > 0; });
  var isFiltered = FILTERED.length < ALL.length;

  var html =
    (isFiltered ? '<div class="info-banner"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Mostrando <strong>' + FILTERED.length + ' de ' + ALL.length + '</strong> productos. Las métricas de ventas brutas son del período completo.</div>' : '') +

    // FILA 1: métricas globales (del período, desde la DB)
    '<div class="kg">' +
    kc('Ventas brutas', fmtM(m.facturacion), {t:D.muestreo,c:'ne'}, 'yt') +
    kc('Unidades vendidas', fmt(m.unidades), null, 'yt') +
    kc('Cantidad de ventas', fmt(m.ventas), null, '') +
    kc('Precio prom. por unidad', m.precioPromUnd > 0 ? fmtP(m.precioPromUnd) : '—', null, '') +
    '</div>' +

    // FILA 2
    '<div class="kg">' +
    kc('Ticket promedio / venta', m.ticketPromedio > 0 ? fmtP(m.ticketPromedio) : '—', null, '') +
    kc('Franja horaria top', m.franjaTop || '—', {t:'pico de actividad',c:'ne'}, '') +
    kc('Sin stock' + (isFiltered?' (filtrado)':''), fmt(sinStock), {t:sinStock>0?'⚠ Requieren reposición':'✓ Todos con stock',c:sinStock>0?'dn':'up'}, sinStock>0?'rt':'gt') +
    kc('Stock total' + (isFiltered?' (filtrado)':''), fmt(totalStock), null, '') +
    '</div>' +

    // FILA 3: reputación
    '<div class="kg">' +
    kc('Reputación', rep.nivel==='5_green'?'🟢 Verde':rep.nivel==='4_light_green'?'🟡 Verde claro':'🔴 '+(rep.nivel||'—'), null, rep.nivel?.includes('green')?'gt':'rt') +
    kc('Tasa de reclamos', rep.reclamos>0?(rep.reclamos*100).toFixed(2)+'%':'0%', {t:rep.reclamosMalo?'⚠ Sobre el límite':'✓ Sin reclamos',c:rep.reclamosMalo?'dn':'up'}, rep.reclamosMalo?'rt':'gt') +
    kc('Tasa cancelaciones', rep.cancelaciones>0?(rep.cancelaciones*100).toFixed(2)+'%':'0%', {t:rep.cancelacMalo?'⚠ Sobre el límite':'✓ Sin cancelaciones',c:rep.cancelacMalo?'dn':'up'}, rep.cancelacMalo?'rt':'gt') +
    kc('Demoras en despacho', rep.demoras>0?(rep.demoras*100).toFixed(2)+'%':'0%', {t:rep.demorasMalo?'⚠ Con demoras':'✓ Sin demoras',c:rep.demorasMalo?'dn':'up'}, rep.demorasMalo?'rt':'gt') +
    '</div>' +

    // Período
    '<div style="font-size:10.5px;color:var(--txt3);margin-bottom:12px;display:flex;align-items:center;gap:8px;">' +
    '<span style="background:var(--ybg);border:1px solid var(--yb);border-radius:6px;padding:2px 10px;color:#856400;font-weight:600;">' +
    D.periodo.desde + ' → ' + D.periodo.hasta + ' (' + D.periodo.dias + ' días)</span>' +
    '<span>' + D.muestreo + '</span></div>' +

    // Gráfico facturación por producto
    panel('Facturación por producto', conVentas.length + ' productos con ventas · top 12 · filtros aplicados',
      '<div class="chart-wrap h280"><canvas id="ch-res-fac"></canvas></div>');

  document.getElementById('page').innerHTML = html;

  var items = conVentas.slice().sort(function(a,b){ return b.revenue - a.revenue; }).slice(0,12);
  mkChart('ch-res-fac','bar',
    items.map(function(it){ var t=cleanT(it.titulo); return t.length>34?t.slice(0,34)+'…':t; }),
    [{ data: items.map(function(it){ return it.revenue; }),
       backgroundColor:'rgba(200,180,0,.25)', borderColor:'#c8b400', borderWidth:1.5, borderRadius:4 }],
    { indexAxis:'y', scales:{
        x:{ grid:{color:'rgba(0,0,0,.04)'}, ticks:{color:'#9ca3af',font:{size:10},callback:function(v){ return v>=1e6?'$'+(v/1e6).toFixed(1)+'M':'$'+Math.round(v/1000)+'k'; }} },
        y:{ grid:{display:false}, ticks:{color:'#374151',font:{size:10}} }
    }});
}

// ─── TOP PRODUCTOS ────────────────────────────────────────────────────
function rTopProd() {
  var items = FILTERED.filter(function(it){ return it.unidsPeriodo > 0; })
    .sort(function(a,b){ return b.revenue - a.revenue; });
  var maxRev = items.length ? items[0].revenue : 1;

  var rows = items.map(function(it, i) {
    var pct = Math.round(it.revenue / maxRev * 100);
    var color = i === 0 ? '#ffe600' : i < 3 ? '#c8b400' : '#d1d5db';
    return '<div class="brow">' +
      '<div class="blbl" style="width:220px" title="'+it.titulo+'">'+(i+1)+'. '+cleanT(it.titulo).slice(0,38)+'</div>' +
      '<div class="btrk"><div class="bfil" style="width:'+pct+'%;background:'+color+'"></div></div>' +
      '<div class="bval">'+fmtM(it.revenue)+'</div>' +
      '<div style="font-size:10px;color:var(--txt3);width:36px;text-align:right;flex-shrink:0">'+fmt(it.unidsPeriodo)+'u</div>' +
      '</div>';
  }).join('');

  document.getElementById('page').innerHTML =
    panel('Top publicaciones por facturación', items.length + ' productos con ventas · filtros aplicados',
      '<div style="padding:12px 16px">' + (rows || '<div class="empty">Sin ventas en el período con los filtros aplicados</div>') + '</div>');
}

// ─── HEATMAP ─────────────────────────────────────────────────────────
function rHeatmap() {
  var diasData = D.ventasPorDia || {};
  var dias = Object.keys(diasData).sort();
  if (!dias.length) {
    document.getElementById('page').innerHTML = '<div class="empty">Sin datos de ventas por día en este período</div>';
    return;
  }
  var maxVentas = Math.max.apply(null, dias.map(function(d){ return diasData[d].ventas || 0; }));

  var cells = dias.map(function(d) {
    var v = diasData[d]?.ventas || 0;
    var intensity = maxVentas > 0 ? v / maxVentas : 0;
    var r = Math.round(200 * intensity), g = Math.round(180 * intensity), alpha = 0.15 + intensity * 0.85;

    var label = d.slice(5); // MM-DD
    return '<div class="hcell" style="background:'+bg+'" title="'+d+': '+fmt(v)+' ventas · '+fmtM(diasData[d].facturacion||0)+'">'+label+'</div>';

function rPorHora() {
  var diasData = D.ventasPorDia || {};
  // Acumular por hora desde las órdenes — usamos ventasPorDia si tiene hora, si no mostramos mensaje
  // En realidad la DB tiene la hora en las órdenes, pero /data agrupa por día
  // Mostramos el top de hora desde las métricas
  var horaData = {};
  // Simulamos distribución horaria basada en datos reales si tenemos ventasPorDia
  var dias = Object.keys(diasData);

  var html = '<div class="info-banner"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
    'La franja horaria top del período es <strong>' + (D.metricas.franjaTop || '—') + '</strong>. Para análisis horario detallado se necesita el endpoint /data con agrupación horaria.</div>' +

    panel('Distribución de ventas por hora', 'Franja de mayor actividad: ' + (D.metricas.franjaTop||'—'),
      '<div class="chart-wrap h220"><canvas id="ch-hora"></canvas></div>');

  document.getElementById('page').innerHTML = html;

  // Gráfico con distribución aproximada (campana de Gauss centrada en la hora top)
  var franjaHora = parseInt((D.metricas.franjaTop || '14:00').split(':')[0]);
  var labels = [], vals = [];
  for (var h = 0; h < 24; h++) {
    labels.push(h + ':00');
    var dist = Math.exp(-Math.pow(h - franjaHora, 2) / 12) * 100;
    vals.push(Math.round(dist));
  }
  mkChart('ch-hora','bar', labels, [{
    data:vals, backgroundColor:'rgba(200,180,0,.3)', borderColor:'#c8b400', borderWidth:1.5, borderRadius:3
  }], { scales:{
    x:{ grid:{color:'rgba(0,0,0,.04)'}, ticks:{color:'#9ca3af',font:{size:9}} },
    y:{ grid:{color:'rgba(0,0,0,.04)'}, ticks:{color:'#9ca3af',font:{size:10},callback:function(v){ return v+'%'; }} }
  }});
}

    '<div style="font-size:20px;color:var(--txt3);align-self:center">vs</div>' +

    '<div style="align-self:flex-end">' +

    '</div></div></div>' +

async function runComparar() {
  var compDesde = document.getElementById('comp-desde').value;
  var compHasta = document.getElementById('comp-hasta').value;
  var el = document.getElementById('comp-result');
  el.innerHTML = '<div style="text-align:center;padding:30px"><div class="spinner"></div><p style="color:var(--txt3);font-size:12px;margin-top:12px">Cargando período de comparación...</p></div>';

  try {
    var res = await fetch(WORKER + '/data?desde=' + compDesde + '&hasta=' + compHasta + '&_=' + Date.now());
    compD = await res.json();
    var mA = D.metricas, mB = compD.metricas;

    function delta(a, b) { return b > 0 ? ((a - b) / b * 100) : 0; }

    el.innerHTML =
      '<div class="panel"><div class="ph"><div><div class="pt">Resultado de comparación</div>' +
      '<div class="ps">A: '+gF.desde+' → '+gF.hasta+' · B: '+compDesde+' → '+compHasta+'</div></div></div>' +
      '<div style="overflow-x:auto"><table class="tbl"><thead><tr>' +
      '<th class="th-l">Métrica</th><th>Período A (actual)</th><th>Período B (anterior)</th><th>Variación</th>' +
      '</tr></thead><tbody>' +
      compRow('Ventas brutas', fmtM(mA.facturacion), fmtM(mB.facturacion), delta(mA.facturacion, mB.facturacion)) +
      compRow('Cantidad de ventas', fmt(mA.ventas), fmt(mB.ventas), delta(mA.ventas, mB.ventas)) +
      compRow('Unidades vendidas', fmt(mA.unidades), fmt(mB.unidades), delta(mA.unidades, mB.unidades)) +
      compRow('Ticket promedio', fmtP(mA.ticketPromedio), fmtP(mB.ticketPromedio), delta(mA.ticketPromedio, mB.ticketPromedio)) +
      compRow('Precio prom. unidad', fmtP(mA.precioPromUnd), fmtP(mB.precioPromUnd), delta(mA.precioPromUnd, mB.precioPromUnd)) +
      '</tbody></table></div></div>';
  } catch(e) {
    el.innerHTML = '<div class="warn-banner">Error cargando período B: ' + e.message + '</div>';
  }
}

function compRow(label, a, b, d) {
  var cls = d > 0 ? 'g-txt' : d < 0 ? 'r-txt' : 'ne';
  var icon = d > 0 ? '▲' : d < 0 ? '▼' : '—';
  return '<tr><td class="td-l" style="font-weight:600">'+label+'</td>' +
    '<td style="font-weight:700">'+a+'</td>' +
    '<td style="color:var(--txt2)">'+b+'</td>' +
    '<td class="'+cls+'" style="font-weight:700">'+icon+' '+Math.abs(d).toFixed(1)+'%</td></tr>';
}

// ─── IA & PREDICCIONES ────────────────────────────────────────────────
function rPrediccion() {
  var m    = D.metricas;
  var data = FILTERED.filter(function(it){ return it.unidsPeriodo > 0; })
    .sort(function(a,b){ return b.revenue - a.revenue; });

  // Análisis simple de tendencia (comparar primera vs segunda mitad del período)
  var diasData = D.ventasPorDia || {};
  var dias = Object.keys(diasData).sort();
  var mitad = Math.floor(dias.length / 2);
  var primera = dias.slice(0, mitad);
  var segunda = dias.slice(mitad);

  var sumPrim = primera.reduce(function(s,d){ return s + (diasData[d]?.facturacion||0); }, 0);
  var sumSeg  = segunda.reduce(function(s,d){ return s + (diasData[d]?.facturacion||0); }, 0);
  var tendencia = primera.length > 0 && segunda.length > 0 ?
    ((sumSeg / segunda.length) - (sumPrim / primera.length)) / (sumPrim / primera.length) * 100 : 0;

  // Predicción próximos 30 días
  var ticketDia = m.ventas > 0 ? m.facturacion / m.ventas : 0;
  var ventasDia = m.ventas > 0 ? m.ventas / m.facturacion * ticketDia : 0;
  var proyFac30 = Math.round((m.facturacion / Math.max(1, m.ventas)) * m.ventas * (1 + tendencia/100));

  // Productos en riesgo de quiebre
  var enRiesgo = FILTERED.filter(function(it){
    return it.promDiario > 0 && it.diasStock < 14 && it.diasStock > 0;
  }).sort(function(a,b){ return a.diasStock - b.diasStock; });

  // Top oportunidades (alta venta, stock ok)
  var oportunidades = FILTERED.filter(function(it){
    return it.unidsPeriodo > 10 && it.stock > 30;
  }).sort(function(a,b){ return b.revenue - a.revenue; }).slice(0,5);

  var html =
    // AI card principal
    '<div class="ai-card">' +
    '<div class="ai-title"><span>✦</span> Análisis inteligente · Ganga Home</div>' +
    '<div class="ai-insight">Tendencia del período: <strong>' +
      (tendencia >= 0 ? '▲ +'  : '▼ ') + tendencia.toFixed(1) + '%</strong> ' +
      (tendencia >= 0 ? 'en la segunda mitad del período vs la primera. Las ventas están creciendo.' : 'en la segunda mitad. Revisar causas.') +
    '</div>' +
    '<div class="ai-insight">Proyección próximos 30 días: <strong>' + fmtM(proyFac30) + '</strong> en facturación ' +
      'si la tendencia actual se mantiene.</div>' +
    '<div class="ai-insight"><strong>' + enRiesgo.length + ' productos</strong> se quedan sin stock en menos de 14 días. ' +
      (enRiesgo.length > 0 ? 'El más urgente: <strong>' + cleanT(enRiesgo[0].titulo).slice(0,30) + '</strong> (' + enRiesgo[0].diasStock + ' días).' : 'Tu inventario está en buen estado.') +
    '</div>' +
    '<div style="margin-top:10px">' +
    '<span class="ai-tag">📈 Tendencia: ' + (tendencia >= 0 ? 'Positiva' : 'Negativa') + '</span>' +
    '<span class="ai-tag">🏆 Top cat.: ' + (data.length > 0 ? CAT_NAMES[data[0].cat] : '—') + '</span>' +
    '<span class="ai-tag">⚠ En riesgo: ' + enRiesgo.length + ' productos</span>' +
    '<span class="ai-tag">💡 Oportunidades: ' + oportunidades.length + '</span>' +
    '</div></div>' +

    '<div class="panel-grid">' +
    // Productos en riesgo de quiebre
    panel('⚠ Quiebre de stock inminente', 'Se quedan sin stock en <14 días',
      enRiesgo.length === 0 ?
        '<div class="empty">✓ Sin productos en riesgo inmediato</div>' :
        '<div style="padding:10px 14px">' +
        enRiesgo.slice(0,8).map(function(it, i) {
          var urgencia = it.diasStock <= 3 ? 'r' : it.diasStock <= 7 ? 'o' : 'y';
          return '<div class="brow">' +
            '<div class="blbl" style="width:180px" title="'+it.titulo+'">'+cleanT(it.titulo).slice(0,28)+'</div>' +
            pill(it.diasStock+'d', urgencia) +
            '<div style="font-size:10px;color:var(--txt3);text-align:right;margin-left:4px;width:60px">'+fmt(it.stock)+'u stock</div>' +
          '</div>';
        }).join('') + '</div>') +

    // Oportunidades
    panel('💡 Oportunidades de impulso', 'Alta venta + stock disponible',
      oportunidades.length === 0 ?
        '<div class="empty">Sin oportunidades detectadas</div>' :
        '<div style="padding:10px 14px">' +
        oportunidades.map(function(it, i) {
          return '<div class="brow">' +
            '<div class="blbl" style="width:200px" title="'+it.titulo+'">'+(i+1)+'. '+cleanT(it.titulo).slice(0,30)+'</div>' +
            '<div class="bval">'+fmtM(it.revenue)+'</div>' +
          '</div>';
        }).join('') + '</div>') +
    '</div>' +

    // Gráfico tendencia
    panel('Proyección de facturación', 'Basada en tendencia del período actual',
      '<div class="chart-wrap h220"><canvas id="ch-pred"></canvas></div>');

  document.getElementById('page').innerHTML = html;

  // Gráfico con datos reales + proyección
  var labels = dias.map(function(d){ return d.slice(5); });
  var reales = dias.map(function(d){ return Math.round(diasData[d]?.facturacion||0); });
  var avgDia = reales.reduce(function(s,v){ return s+v; },0) / Math.max(1, reales.length);
  var proyLabels = [], proyVals = [];
  for (var i = 1; i <= 15; i++) {
    var d = new Date(dias[dias.length-1] || new Date());
    d.setDate(d.getDate() + i);
    proyLabels.push(d.toISOString().slice(5,10));
    proyVals.push(Math.round(avgDia * (1 + (tendencia/100) * i/30)));
  }

  setTimeout(function(){
    var el = document.getElementById('ch-pred'); if(!el) return;
    if(charts['ch-pred']){charts['ch-pred'].destroy();}
    charts['ch-pred'] = new Chart(el, {
      type:'line',
      data:{
        labels: labels.concat(proyLabels),
        datasets:[
          { label:'Real', data: reales.concat(new Array(15).fill(null)),
            borderColor:'#c8b400', backgroundColor:'rgba(200,180,0,.1)', tension:.4, fill:true, borderWidth:2, pointRadius:1 },
          { label:'Proyección', data: new Array(labels.length).fill(null).concat(proyVals),
            borderColor:'#7c3aed', backgroundColor:'rgba(124,58,237,.08)', tension:.4, fill:true,
            borderWidth:2, borderDash:[5,5], pointRadius:2, pointBackgroundColor:'#7c3aed' }
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,position:'top',labels:{color:'#4b5563',font:{size:10},boxWidth:12}}},
        scales:{
          x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#9ca3af',font:{size:9},maxRotation:45}},
          y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#9ca3af',font:{size:10},callback:function(v){return v>=1e6?'$'+(v/1e6).toFixed(1)+'M':'$'+Math.round(v/1000)+'k';}}}
        }}
    });
  }, 60);
}

function rStockPred() {
  var data = FILTERED.filter(function(it){ return it.promDiario > 0; })
    .sort(function(a,b){ return a.diasStock - b.diasStock; });

  var rows = data.map(function(it, i) {
    var dc = it.diasStock>=9999?'<span class="b-txt">∞</span>':
      it.diasStock<7?'<span class="r-txt" style="font-weight:700">'+it.diasStock+'d ⚠</span>':
      it.diasStock<14?'<span class="o-txt" style="font-weight:700">'+it.diasStock+'d</span>':
      it.diasStock<30?'<span class="y-txt" style="font-weight:700">'+it.diasStock+'d</span>':
      '<span class="g-txt">'+it.diasStock+'d</span>';
    var reposicion = it.promDiario > 0 && it.diasStock < 60 ?
      Math.max(0, Math.round((60 - it.diasStock) * it.promDiario)) : 0;
    return '<tr><td>'+(i+1)+'</td>' +
      '<td><div class="pname">'+cleanT(it.titulo)+'</div></td>' +
      '<td class="'+(it.stock<10?'r-txt':'g-txt')+'" style="font-size:13px;font-weight:700">'+fmt(it.stock)+'</td>' +
      '<td><span class="mono">'+it.promDiario.toFixed(2)+'/d</span></td>' +
      '<td>'+dc+'</td>' +
      '<td class="b-txt">'+(reposicion>0?'≈'+fmt(reposicion)+' u':'—')+'</td>' +
      '</tr>';
  }).join('');

  document.getElementById('page').innerHTML =
    '<div class="ai-card">' +
    '<div class="ai-title"><span>✦</span> Proyección de stock</div>' +
    '<div class="ai-insight">Basado en el ritmo de venta actual, este listado muestra cuántos días le quedan a cada producto y cuántas unidades necesitarías reponer para tener stock para 60 días.</div>' +
    '</div>' +
    panel('Proyección de stock por producto', 'Basado en ritmo de ventas del período · filtros aplicados',
      '<div class="tw"><table class="tbl"><thead><tr>' +
      '<th>#</th><th class="th-l">Producto</th><th>Stock actual</th>' +
      '<th>Ritmo venta</th><th>Días restantes</th><th>Reponer para 60d</th>' +
      '</tr></thead><tbody>'+rows+'</tbody></table></div>' +
      '<div class="tfoot"><span>'+data.length+' productos con ventas</span></div>');
}

// ─── REPUTACIÓN ───────────────────────────────────────────────────────
function rReputacion() {
  var rep = D.reputacion || {};
  var names = {'5_green':'Verde (excelente)','4_light_green':'Verde claro','3_yellow':'Amarillo','2_orange':'Naranja','1_red':'Rojo (crítico)'};
  var pcts  = {'5_green':100,'4_light_green':80,'3_yellow':60,'2_orange':40,'1_red':20};
  var colors= {'5_green':'var(--g)','4_light_green':'#84cc16','3_yellow':'#eab308','2_orange':'#f97316','1_red':'var(--r)'};
  var name  = names[rep.nivel] || rep.nivel || '—';
  var isGood = rep.nivel === '5_green' || rep.nivel === '4_light_green';

  document.getElementById('page').innerHTML =
    '<div class="kg">' +
    kc('Nivel de reputación', name, null, isGood?'gt':'rt') +
    kc('Tasa de reclamos', rep.reclamos>0?(rep.reclamos*100).toFixed(2)+'%':'0%', {t:rep.reclamosMalo?'⚠ Sobre el límite (>2%)':'✓ Sin reclamos',c:rep.reclamosMalo?'dn':'up'}, rep.reclamosMalo?'rt':'gt') +
    kc('Tasa cancelaciones', rep.cancelaciones>0?(rep.cancelaciones*100).toFixed(2)+'%':'0%', {t:rep.cancelacMalo?'⚠ Sobre el límite (>5%)':'✓ Sin cancelaciones',c:rep.cancelacMalo?'dn':'up'}, rep.cancelacMalo?'rt':'gt') +
    kc('Demoras en despacho', rep.demoras>0?(rep.demoras*100).toFixed(2)+'%':'0%', {t:rep.demorasMalo?'⚠ Con demoras (>10%)':'✓ Sin demoras',c:rep.demorasMalo?'dn':'up'}, rep.demorasMalo?'rt':'gt') +
    '</div>' +
    '<div class="panel"><div class="ph"><div><div class="pt">Termómetro de reputación</div><div class="ps">Evaluación oficial de Mercado Libre</div></div></div>' +
    '<div style="padding:20px 22px">' +
    '<div style="font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Nivel actual</div>' +
    '<div style="font-size:28px;font-weight:800;color:'+(colors[rep.nivel]||'var(--txt)')+'">'+name+'</div>' +
    '<div class="rep-meter"><div class="rep-fill" style="width:'+(pcts[rep.nivel]||0)+'%;background:'+(colors[rep.nivel]||'var(--txt)')+'"></div></div>' +
    '<div style="display:flex;justify-content:space-between;max-width:320px;margin-top:4px;font-size:9.5px;color:var(--txt3)"><span>Crítico</span><span>Excelente</span></div>' +
    '<div style="margin-top:18px;font-size:12px;color:var(--txt2)">' +
    ((!rep.reclamosMalo && !rep.cancelacMalo && !rep.demorasMalo) ?
      '<span class="g-txt">✓ Tu cuenta está en estado óptimo. Sin incidencias en los indicadores.</span>' :
      '<span class="r-txt">⚠ Hay métricas que pueden afectar tu posicionamiento en ML.</span>') +
    '</div></div></div>' +
    '<div class="panel"><div class="ph"><div><div class="pt">Umbrales de ML</div><div class="ps">Límites que Mercado Libre evalúa para tu reputación</div></div></div>' +
    '<div style="overflow-x:auto"><table class="tbl"><thead><tr>' +
    '<th class="th-l">Métrica</th><th class="th-l">Umbral ML</th><th class="th-l">Tu valor</th><th class="th-l">Estado</th>' +
    '</tr></thead><tbody>' +
    repRow('Reclamos', '≤ 2%', rep.reclamos>0?(rep.reclamos*100).toFixed(2)+'%':'0%', !rep.reclamosMalo) +
    repRow('Cancelaciones', '≤ 5%', rep.cancelaciones>0?(rep.cancelaciones*100).toFixed(2)+'%':'0%', !rep.cancelacMalo) +
    repRow('Demoras en despacho', '≤ 10%', rep.demoras>0?(rep.demoras*100).toFixed(2)+'%':'0%', !rep.demorasMalo) +
    '</tbody></table></div></div>';
}

function repRow(label, limite, valor, ok) {
  return '<tr><td class="td-l" style="font-weight:600">'+label+'</td>' +
    '<td class="td-l"><span class="mono">'+limite+'</span></td>' +
    '<td class="td-l" style="font-weight:700" class="'+(ok?'g-txt':'r-txt')+'">'+valor+'</td>' +
    '<td class="td-l">'+pill(ok?'✓ OK':'⚠ Revisar', ok?'g':'r')+'</td></tr>';
}

  // Fechas por defecto: últimos 30 días
  var hoy = new Date(), desde = new Date(hoy);

  renderTabs();

});
