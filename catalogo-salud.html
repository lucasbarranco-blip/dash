<!DOCTYPE html>
<!-- VERSION catalogo v4-sync -->
<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salud del Catálogo · Ganga Home</title>
<style>
:root{--ink:#13211d;--bg:#f4f2ea;--card:#fff;--line:#e3ded0;--mut:#7a7565;
--red:#d83a2b;--amber:#e0a008;--green:#1f8a5b;--blue:#2563c9;--accent:#e8552d;--purple:#7c5cbf;
--sh:0 1px 2px rgba(19,33,29,.04),0 6px 20px rgba(19,33,29,.06)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);
font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;line-height:1.45}
.mono{font-variant-numeric:tabular-nums;font-family:ui-monospace,Menlo,Consolas,monospace}
.app{max-width:1340px;margin:0 auto;padding:0 18px 70px}
header{background:var(--ink);color:#f1ede1;padding:15px 0}
header .in{max-width:1340px;margin:0 auto;padding:0 18px;display:flex;align-items:center;gap:14px}
header b{font-size:16px}header span.sub{font-size:11px;color:#9bb0a6;text-transform:uppercase;letter-spacing:2px}
.spacer{flex:1}
.statepill{font-size:11.5px;padding:5px 12px;border-radius:999px;background:rgba(255,255,255,.09);color:#cfe0d7;display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(255,255,255,.12)}
.dot{width:7px;height:7px;border-radius:50%;background:#9bb0a6}.dot.live{background:var(--green)}.dot.err{background:var(--red)}.dot.load{background:var(--amber)}
button{font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border-radius:8px;padding:8px 14px;border:1px solid var(--line);background:var(--card);color:var(--ink);transition:.12s}
button:hover{box-shadow:var(--sh)}button.dark{background:var(--ink);color:#fff;border-color:var(--ink)}
.topbtn{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.18)}

.hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:22px 0}
.stat{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 16px;box-shadow:var(--sh);position:relative;overflow:hidden}
.stat .l{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--mut)}
.stat .v{font-size:27px;font-weight:750;margin-top:5px;line-height:1}
.stat .s{font-size:12px;color:var(--mut);margin-top:3px}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--blue)}
.stat.red::before{background:var(--red)}.stat.amber::before{background:var(--amber)}.stat.green::before{background:var(--green)}.stat.purple::before{background:var(--purple)}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:8px 0 16px}
.toolbar input[type=search]{border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-family:inherit;font-size:13px;min-width:240px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--card)}
.seg button{border:none;border-radius:0;padding:9px 13px;font-size:12.5px}
.seg button.on{background:var(--ink);color:#fff}
.cnt{font-size:12.5px;color:var(--mut)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh);overflow:hidden;display:flex;flex-direction:column}
.card .top{display:flex;gap:12px;padding:14px 15px 10px}
.scorewrap{flex-shrink:0;width:58px;height:58px;position:relative}
.scorewrap svg{transform:rotate(-90deg)}
.scorewrap .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:750}
.card .meta{min-width:0;flex:1}
.card .ttl{font-size:13px;font-weight:650;line-height:1.3;max-height:2.6em;overflow:hidden}
.card .mla{font-size:11px;color:var(--mut);font-family:ui-monospace,monospace;margin-top:3px}
.mllink{font-family:Inter,sans-serif;color:var(--blue);text-decoration:none;font-weight:600;font-size:10.5px;margin-left:6px;white-space:nowrap}
.mllink:hover{text-decoration:underline}
.card .tags{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:#ece6d4;color:var(--mut)}
.tag.gx{background:#efe2da;color:#a3502d}
.crit{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border-top:1px solid var(--line)}
.crit .c{background:var(--card);padding:9px 12px;display:flex;align-items:center;gap:8px;font-size:12px;cursor:default}
.crit .c.manual{cursor:pointer;user-select:none}
.crit .c.manual:hover{background:#faf8f1}
.ind{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:var(--line)}
.ind.g{background:var(--green)}.ind.a{background:var(--amber)}.ind.r{background:var(--red)}
.crit .c .lbl{flex:1;color:var(--ink)}
.crit .c .val{font-size:11px;color:var(--mut);font-variant-numeric:tabular-nums}
.crit .c.manual.done .lbl{color:var(--green);font-weight:600}
.crit .c .chk{width:16px;height:16px;border:1.5px solid var(--line);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
.crit .c.manual.done .chk{background:var(--green);border-color:var(--green)}
.auto-badge{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
.notes{padding:10px 13px 12px;border-top:1px solid var(--line);background:#fcfbf6}
.notes-head{font-size:11px;color:var(--mut);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.notes-head .has-note{color:var(--accent);font-size:9px}
.note-ta{width:100%;border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-family:inherit;font-size:12px;resize:vertical;min-height:38px;background:var(--card);color:var(--ink);line-height:1.4}
.note-ta:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,201,.1)}

.empty{padding:60px 20px;text-align:center;color:var(--mut)}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--mut);margin:0 0 14px;align-items:center}
.legend .li{display:flex;align-items:center;gap:6px}
@media(max-width:520px){.grid{grid-template-columns:1fr}}

/* secciones por estado */
.estsection{margin:0 0 26px}
.estsection-head{display:flex;align-items:center;gap:10px;margin:0 0 12px;padding-bottom:8px;border-bottom:2px solid var(--line)}
.estsection-head h3{margin:0;font-size:15px;font-weight:700}
.estcount{font-size:12px;font-weight:700;background:var(--ink);color:#fff;padding:2px 9px;border-radius:999px}
.est-section-prog .estsection-head h3{color:var(--blue)}
.est-section-opt .estsection-head h3{color:var(--green)}
.estsection-empty{padding:18px;text-align:center;color:var(--mut);font-size:12.5px;background:#faf8f1;border:1px dashed var(--line);border-radius:12px}

/* borde de color de tarjeta según estado */
.card.est-prog{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue),var(--sh)}
.card.est-opt{border-color:var(--green);opacity:.92}
.card{position:relative}

/* barra de botones de estado */
.estbar{display:flex;gap:8px;padding:10px 13px;border-top:1px solid var(--line);background:#faf8f1;flex-wrap:wrap}
.estbtn{font-size:12px;font-weight:600;border-radius:8px;padding:7px 12px;border:1px solid var(--line);cursor:pointer;background:var(--card)}
.estbtn.start{background:var(--blue);color:#fff;border-color:var(--blue);flex:1}
.estbtn.done{background:var(--green);color:#fff;border-color:var(--green);flex:1}
.estbtn.reopen{background:var(--card);color:var(--blue);border-color:var(--blue);flex:1}
.estbtn.ghost{color:var(--mut)}
.estbtn:hover{box-shadow:var(--sh)}

/* botón foco en la esquina de la tarjeta */
.top{position:relative}
.focusbtn{position:absolute;top:0;right:0;background:none;border:none;color:var(--mut);font-size:15px;cursor:pointer;padding:2px 4px;line-height:1}
.focusbtn:hover{color:var(--blue)}

/* modo foco (modal) */
.focus-layer{position:fixed;inset:0;background:rgba(19,33,29,.55);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
.focus-box{background:var(--bg);border-radius:16px;width:100%;max-width:460px;max-height:92vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.focus-bar{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);background:var(--card);position:sticky;top:0;z-index:2}
.fnav{font-size:12.5px;padding:7px 12px}.fnav:disabled{opacity:.4;cursor:default}
.fpos{font-size:12px;color:var(--mut);font-variant-numeric:tabular-nums}
.fclose{font-size:12.5px;background:var(--ink);color:#fff;border-color:var(--ink);padding:7px 13px}
.focus-card{padding:14px}
.focus-card .card{border-radius:14px}
.focus-card .crit .c{padding:12px 14px;font-size:13px}
.focus-card .note-ta{min-height:70px}
</style></head>
<body>
<header><div class="in">
  <div><b>Salud del Catálogo</b><br><span class="sub">Ganga Home · v4-sync</span></div>
  <div class="spacer"></div>
  <span class="statepill"><span class="dot" id="dot"></span><span id="stateTxt">Cargando…</span></span>
  <button class="topbtn" id="btnReload">↻ Actualizar</button>
</div></header>

<div class="app">
  <div class="hero" id="hero"></div>

  <div class="legend">
    <span class="li"><span class="ind g"></span>Óptimo</span>
    <span class="li"><span class="ind a"></span>Mejorable</span>
    <span class="li"><span class="ind r"></span>Atención</span>
    <span style="margin-left:auto" class="auto-badge">● auto = se evalúa con datos · ○ tildás vos lo manual</span>
  </div>

  <div class="toolbar">
    <input type="search" id="search" placeholder="Buscar MLA o título…">
    <div class="seg" id="sortSeg">
      <button class="on" data-s="score-asc">Peor salud primero</button>
      <button data-s="score-desc">Mejor primero</button>
      <button data-s="pending">Más pendientes</button>
    </div>
    <div class="seg" id="filterSeg">
      <button class="on" data-f="all">Todos</button>
      <button data-f="crit">Críticos &lt;50</button>
      <button data-f="manual">Falta revisar</button>
      <button data-f="notas">Con notas</button>
    </div>
    <span class="cnt" id="cnt"></span>
  </div>

  <div id="grid"></div>
  <div class="empty" id="empty" style="display:none">Sin resultados.</div>
</div>

<div id="focusLayer" class="focus-layer" style="display:none">
  <div class="focus-box">
    <div class="focus-bar">
      <button id="focusPrev" class="fnav">← Anterior</button>
      <span id="focusPos" class="fpos"></span>
      <button id="focusNext" class="fnav">Siguiente →</button>
      <span style="flex:1"></span>
      <button id="focusClose" class="fclose">Cerrar ✕</button>
    </div>
    <div id="focusCard" class="focus-card"></div>
  </div>
</div>

// ===== evaluación de criterios =====
// cada criterio devuelve {state:'g'|'a'|'r', val:'texto', pts:0..1}
function evalStock(p){
 const cover=p.vd>0?p.stock/p.vd:(p.stock>0?999:0);
 if(p.stock<=0)return{state:'r',val:'sin stock',pts:0};
 if(cover<7)return{state:'a',val:fmt(cover,0)+'d cobertura',pts:.5};
 if(cover>90)return{state:'a',val:'excedente '+fmt(cover,0)+'d',pts:.6};
 return{state:'g',val:fmt(p.stock)+' u · '+fmt(cover,0)+'d',pts:1};
}
function evalRot(p){
 if(p.v30<=0)return{state:'r',val:'sin ventas 30d',pts:0};
 if(p.v30<3)return{state:'a',val:fmt(p.v30)+' u/mes',pts:.5};
 return{state:'g',val:fmt(p.v30)+' u/mes',pts:1};
}
function evalPrecio(p){
 if(p.precio<=0)return{state:'r',val:'sin precio',pts:0};
 return{state:'g',val:'$'+fmt(p.precio),pts:1};
}
function compute(){
 DATA.forEach(p=>{
  const c=getChk(p.mla);
  const stock=evalStock(p),rot=evalRot(p),precio=evalPrecio(p);
  // manuales: hecho=1, sin hacer=0 (rojo si no, verde si sí)
  const man=k=>({state:c[k]?'g':'r',val:c[k]?'✓ revisado':'pendiente',pts:c[k]?1:0,done:c[k]});
  const titulo=man('titulo'),desc=man('desc'),fotos=man('fotos'),clip=man('clip');
  p.crit={stock,rot,precio,titulo,desc,fotos,clip};
  const all=[stock,rot,precio,titulo,desc,fotos,clip];
  p.score=Math.round(all.reduce((a,x)=>a+x.pts,0)/all.length*100);
  p.pending=[titulo,desc,fotos,clip].filter(x=>!x.done).length;
 });
}

 const pend=DATA.reduce((a,p)=>a+p.pending,0);
 const optimos=DATA.filter(p=>p.score>=80).length;
 const st=(c,l,v,s)=>'<div class="stat '+c+'"><div class="l">'+l+'</div><div class="v">'+v+'</div><div class="s">'+s+'</div></div>';
 $('#hero').innerHTML=
   st(avg>=80?'green':avg>=50?'amber':'red','Salud promedio',avg+'<span style="font-size:15px;color:var(--mut)">/100</span>',n+' publicaciones')
  +st('green','Óptimas',fmt(optimos),'≥80 de salud')
  +st(crit?'red':'green','Críticas',fmt(crit),'<50 de salud')
  +st(pend?'amber':'green','Revisiones pendientes',fmt(pend),'título/ficha/fotos/clip sin tildar')
  +st('purple','Catálogo cubierto',n?Math.round((n-DATA.filter(p=>p.pending===4).length)/n*100)+'%':'0%','con al menos 1 check');
}

// ===== MODO FOCO =====
let FOCUS=null;
function openFocus(mla){FOCUS=mla;renderFocus();document.body.style.overflow='hidden';}
function closeFocus(){FOCUS=null;$('#focusLayer').style.display='none';document.body.style.overflow='';render();}
function renderFocus(){
 const p=DATA.find(x=>x.mla===FOCUS);if(!p)return;
 const layer=$('#focusLayer');layer.style.display='flex';
 $('#focusCard').innerHTML=cardHTML(p);
 // re-enganchar handlers dentro del foco
 const fc=$('#focusCard');
 fc.querySelectorAll('.c.manual').forEach(el=>el.onclick=()=>toggleChkInPlace(el));
 fc.querySelectorAll('.estbtn').forEach(b=>b.onclick=()=>{setEstado(b.dataset.mla,b.dataset.to);renderFocus();});
 fc.querySelectorAll('.focusbtn').forEach(b=>b.remove()); // no hace falta dentro del foco
 fc.querySelectorAll('.note-ta').forEach(t=>{t.onblur=()=>{setNota(t.dataset.mla,t.value);};});
 // navegación: anterior/siguiente dentro del orden actual
 const rows=filterRows();const idx=rows.findIndex(x=>x.mla===FOCUS);
 $('#focusPos').textContent=(idx+1)+' / '+rows.length;
 $('#focusPrev').disabled=idx<=0;$('#focusNext').disabled=idx>=rows.length-1;
 $('#focusPrev').onclick=()=>{if(idx>0){FOCUS=rows[idx-1].mla;renderFocus();}};
 $('#focusNext').onclick=()=>{if(idx<rows.length-1){FOCUS=rows[idx+1].mla;renderFocus();}};
}

function setState(cls,txt){$('#dot').className='dot '+cls;$('#stateTxt').textContent=txt;}
async function load(){
 setState('load','Conectando…');$('#btnReload').disabled=true;
 try{DATA=await SUPA.load();await pullEstado();compute();renderHero();render();
  setState('live',DATA.length+' publicaciones activas');
 }catch(e){setState('err','Error: '+e.message);alert('No pude leer Supabase:\n'+e.message);}
 $('#btnReload').disabled=false;
}
$('#btnReload').onclick=load;
$('#search').oninput=e=>{q=e.target.value;render();};
$$('#sortSeg button').forEach(b=>b.onclick=()=>{$$('#sortSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');sortMode=b.dataset.s;render();});
$$('#filterSeg button').forEach(b=>b.onclick=()=>{$$('#filterSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');filterMode=b.dataset.f;render();});
$('#focusClose').onclick=closeFocus;
$('#focusLayer').onclick=e=>{if(e.target.id==='focusLayer')closeFocus();};
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&FOCUS)closeFocus();
 if(FOCUS&&e.key==='ArrowRight'){$('#focusNext').click();}
 if(FOCUS&&e.key==='ArrowLeft'){$('#focusPrev').click();}});
async function pullEstado(){try{const {C,N,E}=await SUPA.fetchEstado();CHECKS=C;NOTAS=N;ESTADO=E;saveChecks();saveNotas();saveEstado();}catch(e){console.warn('pull estado err',e);}}
setInterval(async()=>{const ae=document.activeElement;if(ae&&ae.classList&&ae.classList.contains('note-ta'))return;try{await pullEstado();compute();renderHero();render();}catch(e){}},25000);
load();
</script>
</body></html>
