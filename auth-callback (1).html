<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conectando con Mercado Libre...</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0D1B2A;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:#fff;border-radius:16px;padding:40px 48px;text-align:center;max-width:420px;width:90%}
  .logo{font-size:13px;font-weight:600;color:#0D1B2A;margin-bottom:28px;letter-spacing:.02em}
  .logo span{color:#C9A84C}
  .spinner{width:40px;height:40px;border:3px solid #E9ECEF;border-top-color:#0D1B2A;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-size:17px;font-weight:600;color:#212529;margin-bottom:8px}
  p{font-size:13px;color:#6C757D;line-height:1.6}
  .check{font-size:44px;margin-bottom:16px}
  .err{background:#FCEBEB;border-radius:8px;padding:12px 16px;margin-top:16px;font-size:12px;color:#A32D2D;text-align:left}
  .btn{display:inline-block;margin-top:20px;padding:10px 24px;background:#0D1B2A;color:#fff;border-radius:8px;font-size:13px;font-weight:500;text-decoration:none;cursor:pointer;border:none}
  .btn:hover{background:#1B3A5C}
</style>
</head>
<body>
<div class="card">
  <div class="logo">MELI + <span>Ganga</span></div>
  <div id="estado-spinner">
    <div class="spinner"></div>
    <h1>Conectando tu cuenta</h1>
    <p>Estamos guardando tu autorización.<br>No cierres esta ventana.</p>
  </div>
  <div id="estado-ok" style="display:none">
    <div class="check">✅</div>
    <h1>¡Cuenta conectada!</h1>
    <p>Mercado Libre quedó vinculado.<br>Te estamos llevando de vuelta a la app...</p>
  </div>
  <div id="estado-error" style="display:none">
    <div class="check">❌</div>
    <h1>Error al conectar</h1>
    <p>No pudimos vincular tu cuenta de Mercado Libre.</p>
    <div class="err" id="err-msg"></div>
    <a href="index.html" class="btn">Volver e intentar de nuevo</a>
  </div>
</div>

<script>
(async function() {
  var WORKER = 'https://ganga-worker.gangahome.workers.dev';

  var params = new URLSearchParams(window.location.search);
  var code   = params.get('code');
  var error  = params.get('error');

  // ML devolvió error (ej: usuario canceló)
  if (error || !code) {
    document.getElementById('estado-spinner').style.display = 'none';
    document.getElementById('estado-error').style.display  = 'block';
    document.getElementById('err-msg').textContent = error
      ? 'Mercado Libre respondió: ' + error
      : 'No se recibió el código de autorización.';
    return;
  }

  try {
    // Intercambiar el code por el access token
    var res = await fetch(WORKER + '/exchange', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ code: code })
    });
    var data = await res.json();

    if (!res.ok || data.error) throw new Error(data.error || 'Error del servidor');

    // Mostrar éxito y redirigir
    document.getElementById('estado-spinner').style.display = 'none';
    document.getElementById('estado-ok').style.display      = 'block';

    setTimeout(function() {
      window.location.href = 'index.html';
    }, 1800);

  } catch(e) {
    document.getElementById('estado-spinner').style.display = 'none';
    document.getElementById('estado-error').style.display   = 'block';
    document.getElementById('err-msg').textContent          = e.message;
  }
})();
</script>
</body>
</html>
